<!-- Notifications Toast -->
<p-toast position="top-right" />

<!-- Content spécifique CARNET -->
<!-- 1ère ligne: Barre données CARNET (ligne entière) -->
<div class="carnet-data-section">
  <app-insurance-data-bar
    #insuranceDataBar
    [customer]="selectedCustomer()"
    [tiersPayants]="selectedCustomer()?.tiersPayants || []"
    [saleType]="'CARNET'"
    [ayantDroit]="null"
    (customerSelected)="onCustomerSelected($event)"
    (openCustomerList)="onOpenCustomerList()"
    (editCustomer)="onEditCustomer()"
    (addCustomer)="onAddCustomer()"
    (editAyantDroit)="onEditAyantDroit()"
    (loadAyantDroits)="onLoadAyantDroits()"
    (addComplementaire)="onAddComplementaire()"
    (removeTiersPayant)="onRemoveTiersPayant($event)"
    (tiersPayantsChanged)="onTiersPayantsChanged($event)">
  </app-insurance-data-bar>
</div>

<!-- 2ème ligne: Recherche produit (ligne entière) -->
<div class="product-search-section">
    <div class="search-section-header">
      <i class="pi pi-search"></i>
      <span>Recherche de produit</span>
    </div>

    <div class="search-controls">
      <!-- Product Search Autocomplete -->
      <div class="product-search-input">
        <app-product-search
          #produitbox
          [autofocus]="hasCustomer()"
          (productSelected)="onProductSelected($event)"
          (productScanned)="onProductScanned($event)">
        </app-product-search>
      </div>

      <!-- Quantity Input -->
      <div class="quantity-input-wrapper">
        <jhi-quantite-produt-saisie
          #quantityBox
          (addQuantite)="onAddQuantity($event)"
          [isValid]="!!selectedProduct() && hasCustomer()"
          [disabledButton]="!selectedProduct() || !hasCustomer()">
        </jhi-quantite-produt-saisie>
      </div>

      <!-- Product Meta -->
      @if(selectedProduct()) {
        <div class="product-meta">
          <div class="meta-item">
            <label>Prix:</label>
            <span class="value">{{ selectedProduct()?.regularUnitPrice || 0 | number:'1.0-0' }} FCFA</span>
          </div>
          <div class="meta-item">
            <label>Stock:</label>
            <span class="value stock-badge" [class.low-stock]="(selectedProduct()?.totalQuantity || 0) < 10">
              {{ selectedProduct()?.totalQuantity || 0 }}
            </span>
          </div>
        </div>
      }
    </div>
  </div>

<!-- 3ème ligne: Tableau produit (gauche) + Sale summary (droite) -->
@if (currentSale()) {
  <div class="row">
    <div class="col-lg-9 col-sm-12 col-md-12 col-xl-9 col-xxl-9">
      <app-product-list
        [salesLines]="salesLines()"
        [isEditable]="!isSaving()"
        [selectedLineId]="selectedLineId()"
        [saleId]="currentSale()?.id"
        [saleType]="'CARNET'"
        (quantityChanged)="onLineQuantityChanged($event)"
        (quantityRequestedChanged)="onLineQuantityRequestedChanged($event)"
        (lineRemoved)="onLineRemoved($event)"
        (lineSelected)="onLineSelected($event)"
        (discountChanged)="onLineDiscountChanged($event)"
        (authorizationRequired)="onAuthorizationRequired($event)" />
    </div>

    <div class="amounts-summary col-lg-3 col-sm-12 col-md-12 col-xl-3 col-xxl-3">
      <div class="grid">
        <div class="col-12">
          <app-sale-summary
            [totalAmount]="currentSale()?.salesAmount || 0"
            [discountAmount]="currentSale()?.discountAmount || 0"
            [taxAmount]="currentSale()?.taxAmount || 0"
            [netAmount]="currentSale()?.netAmount || 0"
            [itemCount]="salesLines().length"
            [showCreditDetails]="true"
            [currentRemise]="currentSale()?.remise"
            (addRemise)="onAddRemise()"
            (removeRemise)="onRemoveRemise()" />
        </div>
        <div class="col-12 d-flex justify-content-center">
          <app-sale-actions
            [saleType]="'CARNET'"
            (validate)="onValidate()"
            (putOnHold)="onPutOnHold()"
            (cancel)="onCancel()" />
        </div>
      </div>
    </div>
  </div>

  <!-- 4ème ligne: Mode règlement (ligne entière) -->
  <app-payment-mode
    [amountToBePaid]="currentSale()!.salesAmount || 0"
    [maxPaymentModes]="2"
    [isDiffere]="currentSale()!.differe || false"
    (paymentComplete)="onPaymentComplete($event)"
    (validationError)="onPaymentError($event)"
  />
} @else {
  <div class="empty-cart-state">
    <div class="empty-cart-icon">
      <i class="pi pi-shopping-cart"></i>
    </div>
    <h3>Panier vide</h3>
    <p>Sélectionnez un client et ajoutez des produits</p>
  </div>
}

<!-- Confirm Dialog -->
<jhi-confirm-dialog #confirmDialog />
