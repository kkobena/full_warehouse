<!-- GRILLE FOURNISSEURS -->
<div class="sfl-grid-wrap">
  <ag-grid-angular
    [columnDefs]="colDefs"
    [defaultColDef]="defaultColDef"
    [getRowId]="getRowId"
    [loading]="loading()"
    [rowClassRules]="rowClassRules"
    [rowData]="fournisseurs()"
    [theme]="theme"
    [context]="gridContext"
    (cellClicked)="onCellClicked($event)"
    style="width: 100%; height: 100%"
  />
</div>

<!-- FOOTER TOTAUX -->
<div class="sfl-totals-bar">
  @if (selectionCount() > 0) {
    <span class="sfl-totals-bar__selected">
      <i class="pi pi-check-square"></i> {{ selectionCount() }} sél.
    </span>
  }
  @if (totalUrgents() > 0) {
    <span class="sfl-totals-bar__urgent">
      <i class="pi pi-bolt"></i> {{ totalUrgents() }} urgent(s)
    </span>
  }
  <span class="ms-auto"></span>
  <span class="sfl-totals-bar__item">
    {{ fournisseurs().length }} fournisseur{{ fournisseurs().length > 1 ? 's' : '' }}
  </span>
  <span class="sfl-totals-bar__item">
    Total estimé : <strong>{{ totalMontant() | number:'1.0-0' }} F</strong>
  </span>
</div>
