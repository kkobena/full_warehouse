
<div class="pharma-smart-content p-1">

  <!-- Toolbar -->
  <div class="pharma-toolbar pharma-toolbar-compact">
    <div class="pharma-toolbar-header">
      <i class="pi pi-shield"></i>
      <span class="pharma-toolbar-title">Rôles</span>
    </div>
    <p-toolbar>
      <ng-template #start></ng-template>
      <ng-template #end>
        <div class="pharma-toolbar-actions">
          <p-button
            label="Nouveau rôle"
            icon="pi pi-plus"
            severity="success"
            size="small"
            (onClick)="openCreateForm()"
          />
        </div>
      </ng-template>
    </p-toolbar>
  </div>

  <!-- Table des rôles -->
  <p-table
    [value]="roles()"
    [loading]="loading()"
    [stripedRows]="true"
    class="p-datatable-sm"
    size="small"
  >
    <ng-template #header>
      <tr class="pharma-table-head">
        <th>Libellé</th>
        <th style="width:160px"></th>
      </tr>
    </ng-template>

    <ng-template #body let-role>
      <tr [class.row-predefined]="isPredefined(role.name)">
        <!-- Libellé (éditable) -->
        <td>
          @if (editingName() === role.name) {
            <div class="d-flex align-items-center gap-2">
              <input pInputText
                [fluid]="true"
                [value]="editingLibelle"
                (input)="editingLibelle = $any($event.target).value"
                (keydown.enter)="saveEdit(role)"
                (keydown.escape)="cancelEdit()"
                (blur)="saveEdit(role)"
                autofocus
              />
            </div>
          } @else {
            <div class="libelle-display">
              <span>{{ role.libelle ?? role.name }}</span>
              <button class="edit-btn" type="button" (click)="startEdit(role)" title="Modifier le libellé">
                <i class="pi pi-pencil"></i>
              </button>
            </div>
          }
        </td>

        <!-- Actions -->
        <td class="text-end">
          <div class="d-flex align-items-center justify-content-end gap-1">
            <p-button
              icon="pi pi-lock"
              severity="help"
              size="small"
              [text]="true"
              [rounded]="true"
              pTooltip="Gérer les autorisations"
              (onClick)="managePermissions.emit(role.name!)"
            />
            @if (!isPredefined(role.name)) {
              <p-button
                icon="pi pi-trash"
                severity="danger"
                size="small"
                [text]="true"
                [rounded]="true"
                pTooltip="Supprimer ce rôle"
                (onClick)="deleteRole(role)"
              />
            }
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="3" class="text-center text-muted py-4">
          Aucun rôle trouvé.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
