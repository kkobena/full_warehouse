<div class="modal-header">
  <h4 class="modal-title">{{ header }}</h4>
  <button (click)="cancel()" aria-label="Close" class="btn-close" type="button"></button>
</div>
<form (ngSubmit)="save()" [formGroup]="editForm" name="editForm" novalidate role="form">
  <div class="modal-body">
    <div class="card data-card">
      <div class="card-body">
        <div class="form-grid-compact">
          <div [hidden]="!editForm.get('id')!.value" class="form-group">
            <input class="form-control" formControlName="id" id="id" name="id" readonly
                   type="hidden" />
          </div>

          <div class="form-field form-field-full">
            <label for="libelle">Libllé<span class="required">*</span></label>
            <input #libelle autocomplete="off" class="form-control" formControlName="libelle"
                   id="libelle"
                   name="libelle" type="text" />
            @if (editForm.get('libelle')!.invalid && (editForm.get('libelle')!.dirty
              || editForm.get('libelle')!.touched)) {
              <div>
                @if (editForm.get('libelle')?.errors?.required) {
                  <small class="form-text text-danger" style="color: red"> Ce champ est
                    obligatoire. </small>
                }
              </div>
            }
          </div>

          <div class="form-field form-field-full">
            <label for="code">Code</label>
            <input [appKeyFilter]="'alphanum'" autocomplete="off" class="form-control"
                   formControlName="code" id="code"
                   name="code" type="text" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <app-button (clicked)="cancel()" [raised]="true" icon="pi pi-times" label="Annuler"
                severity="secondary" />
    <app-button
      [disabled]="editForm.invalid || isSaving"
      [raised]="true"
      icon="pi pi-check"
      label="Enregistrer"
      severity="primary"
      type="submit"
    />
  </div>
</form>
