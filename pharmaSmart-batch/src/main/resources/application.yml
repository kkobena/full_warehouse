spring:
  main:
    web-application-type: none

  datasource:
    url: ${PHARMA_DB_URL:jdbc:postgresql://localhost:5432/pharma_smart}
    username: ${PHARMA_DB_USER:pharma_smart}
    password: ${PHARMA_DB_PASSWORD:}
    hikari:
      maximum-pool-size: 5

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${PHARMA_DB_SCHEMA:warehouse}
        jdbc:
          time_zone: UTC
          batch_size: 50
        cache:
          use_second_level_cache: false

  batch:
    jdbc:
      initialize-schema: always
      table-prefix: BATCH_
    job:
      enabled: false

  flyway:
    enabled: false

pharma-smart:
  batch:
    # Interrupteur maître — false pendant les tests fonctionnels, true en production.
    # Quand false : le service démarre normalement mais ne lance aucun job.
    active: false
    chunk-size: 100
    semois-enabled: true
    classification-enabled: true
    # Cron d'exécution nocturne (utilisé uniquement quand active=true).
    # Défaut : 00h30 — adapter si la pharmacie ferme tôt la nuit (ex: "0 0 2 * * *" pour 2h00)
    cron-schedule: "0 30 0 * * *"

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, batch
  endpoint:
    batch:
      enabled: true

logging:
  level:
    com.kobe.warehouse.batch: INFO
    org.springframework.batch: INFO
    root: WARN
