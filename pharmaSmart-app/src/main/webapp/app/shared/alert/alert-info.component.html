<div class="modal-header">
  <h5 class="modal-title">Information</h5>
  <button (click)="cancel()" class="btn-close" type="button">&times;</button>
</div>
<div class="modal-body">
  <app-card [variant]="'form'">
    <div [class]="infoClass">
      <span class="fs-3 fw-semibold">{{ message }}</span>
    </div>
  </app-card>
</div>
<div class="modal-footer">
  <app-button (clicked)="cancel()" icon="pi pi-times" label="Fermer" severity="secondary" />
</div>
