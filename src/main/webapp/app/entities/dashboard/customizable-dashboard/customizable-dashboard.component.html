<div class="pharma-smart-content p-2">
  <!-- Toolbar -->
  <div class="pharma-toolbar pharma-toolbar-compact">
    <div class="pharma-toolbar-header">
      <i class="pi pi-th-large"></i>
      <span class="pharma-toolbar-title">Dashboard Personnalisable</span>
    </div>

    <p-toolbar>
      <ng-template #start>
        <div class="pharma-toolbar-filters d-flex gap-2 align-items-center">
          @if (currentLayout(); as layout) {
            <div class="d-flex align-items-center gap-2">
              <span class="text-muted">Layout actuel:</span>
              <p-tag [value]="layout.name || 'Sans nom'" severity="info" />
            </div>
          }
        </div>
      </ng-template>

      <ng-template #end>
        <div class="pharma-toolbar-actions flex gap-2">
          <p-button
            [label]="isEditMode() ? 'Mode Vue' : 'Mode Édition'"
            [icon]="isEditMode() ? 'pi pi-eye' : 'pi pi-pencil'"
            (onClick)="toggleEditMode()"
            size="small"
            [severity]="isEditMode() ? 'warn' : 'secondary'"
          />

          @if (isEditMode()) {
            <p-button label="Ajouter Widget" icon="pi pi-plus" (onClick)="addWidget()" size="small" />
          }

          <p-button label="Sauvegarder" icon="pi pi-save" (onClick)="saveLayout()" size="small" severity="success" />

          <p-button label="Charger" icon="pi pi-folder-open" (onClick)="openLoadLayoutModal()" size="small" />
        </div>
      </ng-template>
    </p-toolbar>
  </div>

  <!-- Edit Mode Alert -->
  @if (isEditMode()) {
    <div class="mb-3">
      <div class="edit-mode-alert">
        <div class="d-flex align-items-center gap-2">
          <i class="pi pi-info-circle alert-icon"></i>
          <div class="alert-content">
            <strong class="alert-title">Mode Édition activé</strong>
            <p class="alert-text">
              Vous pouvez déplacer et redimensionner les widgets. Cliquez sur "Sauvegarder" pour enregistrer vos modifications.
            </p>
          </div>
        </div>
      </div>
    </div>
  }

  <!-- GridStack Container -->
  <div class="grid-stack-wrapper">
    <div #gridContainer class="grid-stack"></div>
  </div>
</div>
