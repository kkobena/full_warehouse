<div class="container-fluid">
  <div class="pharma-smart-content p-2">
    <app-toolbar icon="pi pi-cog" title="Paramètres de configuaration">
      <ng-container ngProjectAs="[toolbarFilters]">
        <div class="pharma-search-input">
          <app-icon-field icon="pi pi-search">
            <input (keyup.enter)="loadAll()" [(ngModel)]="search" class="form-control" placeholder="Taper pour rechercher" type="text" />
          </app-icon-field>
        </div>
      </ng-container>
    </app-toolbar>

    @if (apps.length > 0) {
      <div class="table-responsive mt-2" style="max-height: calc(100vh - 200px); overflow-y: auto;">
        <table class="table table-striped">
          <thead class="pharma-table-head" style="position: sticky; top: 0; z-index: 1;">
            <tr>
              <th>description</th>
              <th>Valeur</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            @for (app of apps; track app.name) {
              <tr>
                <td>{{ app.description }}</td>
                @if (app.valueType === 'BOOLEAN') {
                  <td>
                    @if (app.name !== 'APP_GESTION_STOCK') {
                      @if (Number(app.value) == 0) {
                        <app-button (clicked)="setActive(app, true)" label="Activer" [raised]="true" severity="danger" size="small" />
                      } @else {
                        <app-button (clicked)="setActive(app, false)" label="Désactiver" [raised]="true" severity="primary" size="small" />
                      }
                    }
                  </td>
                } @else {
                  <td>{{ app.value }}</td>
                }
                <td>
                  @if (app.name !== 'APP_GESTION_STOCK') {
                    <app-button
                      (clicked)="onEdit(app)"
                      icon="pi pi-pencil"
                      label="Modifier"
                      [raised]="true"
                      severity="info"
                      size="small"
                    />
                  }
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }
  </div>
</div>
