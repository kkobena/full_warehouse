<div class="status-bar-wrapper">
  <!-- Barre d'étapes -->
  <div class="status-bar">
    @for (step of steps; track step.label; let i = $index) {
      @if (i > 0) {
        <div class="status-connector" [class.done]="currentStep() >= i"></div>
      }
      <div
        class="status-step"
        [class.active]="currentStep() === i"
        [class.done]="currentStep() > i"
        [pTooltip]="step.tooltip"
        tooltipPosition="bottom"
      >
        <div class="step-circle">
          @if (currentStep() > i) {
            <i class="pi pi-check"></i>
          } @else {
            <i [class]="step.icon"></i>
          }
        </div>
        <span class="step-label">{{ step.label }}</span>
      </div>
    }
  </div>

  <!-- Taux de service fournisseur -->
  @if (stats()) {
    <div class="stats-service"
         [pTooltip]="'Taux de service sur ' + stats()!.periodeJours + ' jours (qty reçue / qty commandée)'"
         tooltipPosition="bottom">
      <span class="stats-badge" [class]="tauxClass()">
        <i class="pi pi-chart-bar"></i>
        {{ stats()!.tauxService | number:'1.1-1' }}%
      </span>
      <span class="stats-delai">
        <i class="pi pi-clock"></i>
        {{ stats()!.delaiMoyen | number:'1.1-1' }}j
      </span>
    </div>
  }
</div>
