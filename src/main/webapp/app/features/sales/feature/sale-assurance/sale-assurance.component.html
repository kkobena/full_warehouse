<!-- Notifications Toast -->
<p-toast position="center"/>

<!-- Content spécifique ASSURANCE -->
<!-- 1ère ligne: Barre données ASSURANCE (ligne entière) -->
<div class="insurance-data-section">
  <!-- Toujours afficher pour ASSURANCE (comme ancien) -->
  <app-insurance-data-bar
    #insuranceDataBar
    [customer]="selectedCustomer()"
    [tiersPayants]="currentSale()?.tiersPayants || []"
    [saleType]="'ASSURANCE'"
    [ayantDroit]="currentSale()?.ayantDroit || null"
    (customerSelected)="onCustomerSelectedFromBar($event)"
    (openCustomerList)="onOpenCustomerList($event)"
    (editCustomer)="onEditCustomer()"
    (addCustomer)="onAddCustomer()"
    (editAyantDroit)="onEditAyantDroit()"
    (loadAyantDroits)="onLoadAyantDroits()"
    (addComplementaire)="onAddComplementaire()"
    (removeTiersPayant)="onRemoveTiersPayant($event)"
    (tiersPayantsChanged)="onTiersPayantsChanged($event)"
    (focusProductSearch)="focusProductSearch()">
  </app-insurance-data-bar>
</div>

<!-- 2ème ligne: Recherche produit (ligne entière) -->
<app-product-search-section
  #produitbox
  [autofocus]="false"
  [selectedProduct]="selectedProduct()"
  [saleType]="'ASSURANCE'"
  [requiresCustomer]="true"
  [showStock]="showStock()"
  [hasCustomer]="hasCustomer()"
  (productSelected)="onProductSelected($event)"
  (productScanned)="onProductScanned($event)"
  (onKeyEnter)="onProductSearchEnter($event)"
  (addQuantite)="onAddQuantity($event)">
</app-product-search-section>

<!-- 3ème ligne: Tableau produit (gauche) + Sale summary (droite) -->
@if (currentSale()) {
  <div class="row">
    <div class="col-lg-9 col-sm-12 col-md-12 col-xl-9 col-xxl-9">
      <app-product-list
        [salesLines]="salesLines()"
        [isEditable]="!isSaving()"
        [selectedLineId]="selectedLineId()"
        [saleId]="currentSale()?.id"
        [saleType]="'ASSURANCE'"
        [remises]="remises()"
        [currentRemise]="currentSale()?.remise"
        [showRemiseSection]="false"
        (quantityChanged)="onLineQuantityChanged($event)"
        (quantityRequestedChanged)="onLineQuantityRequestedChanged($event)"
        (lineRemoved)="onLineRemoved($event)"
        (lineSelected)="onLineSelected($event)"
        (discountChanged)="onLineDiscountChanged($event)"
        (authorizationRequired)="onAuthorizationRequired($event)"
        (remiseSelected)="onRemiseSelected($event)"
        (removeRemise)="onRemoveRemise()"
        (remiseActionCancelled)="focusProductSearch()"/>
    </div>

    <div class="amounts-summary col-lg-3 col-sm-12 col-md-12 col-xl-3 col-xxl-3">
      <div class="grid">
        <div class="col-12">
          <app-sale-summary
            [totalAmount]="currentSale()?.salesAmount || 0"
            [discountAmount]="currentSale()?.discountAmount || 0"
            [taxAmount]="currentSale()?.taxAmount || 0"
            [netAmount]="currentSale()?.netAmount || 0"
            [amountToBePaid]="currentSale()?.amountToBePaid || 0"
            [itemCount]="salesLines().length"
            [isAvoir]="isAvoir()"
            [saleType]="'ASSURANCE'"
            [partAssurance]="currentSale()?.partTiersPayant || 0"
            [partClient]="currentSale()?.amountToBePaid || 0"
            [changeAmount]="currentChange()"/>
        </div>
        <div class="col-12 d-flex justify-content-center">
          <app-sale-actions
            [canSave]="canSaveSale() && hasCustomer()"
            [canPrint]="!!currentSale()?.saleId"
            [isSaving]="isSaving()"
            [saleType]="'ASSURANCE'"
            [isSmallScreen]="isSmallScreen()"
            [isPresale]="isPresale()"
            [canSaveAsPresale]="canSaveSale() && hasCustomer()"
            (save)="onSave()"
            (saveAndPrint)="onSaveAndPrint()"
            (print)="onPrint()"
            (putOnHold)="putOnStandby()"
            (saveAsPresale)="onSaveAsPresale()"
            (cancel)="onCancel()"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- 4ème ligne: Mode règlement (ligne entière) - Uniquement si montant à payer > 0, masqué en prévente -->
  @if (!isPresale() && (currentSale()?.amountToBePaid || 0) > 0) {
    <app-payment-mode
      #paymentMode
      [amountToBePaid]="currentSale()!.amountToBePaid || 0"
      [maxPaymentModes]="2"
      [isDiffere]="isDiffere()"
      (paymentComplete)="onPaymentComplete($event)"
    />
  }
} @else {
  <div class="empty-cart-state">
    <div class="empty-cart-icon">
      <i class="pi pi-shopping-cart"></i>
    </div>
    <h3>Panier vide</h3>
    <p>Sélectionnez un client assuré et ajoutez des produits</p>
  </div>
}



<jhi-confirm-dialog #confirmDialog></jhi-confirm-dialog>


<!-- Spinner global -->
<ngx-spinner [fullScreen]="true" bdColor="rgba(255,255,255,0.5)" color="#f13151"  name="sale-spinner" size="medium" type="timer"></ngx-spinner>
