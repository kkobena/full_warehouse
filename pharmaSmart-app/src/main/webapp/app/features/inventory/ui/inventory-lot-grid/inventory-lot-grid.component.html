<div class="inventory-grid-wrapper">
  <div class="grid-caption">
    <div class="caption-filters">

      <div class="caption-search">
        <i class="pi pi-search"></i>
        <input
          (input)="onQuickFilterChange()"
          [(ngModel)]="quickFilterText"
          placeholder="Code CIP, N° lot..."
          type="text"
        />
        @if (quickFilterText) {
          <i (click)="quickFilterText = ''; onQuickFilterChange()"
             class="pi pi-times caption-clear"></i>
        }
      </div>

      <app-select
        (selectionChange)="onLotFilterChange()"
        [(ngModel)]="selectedLotFilter"
        [items]="lotFilters"
        [style]="{ width: '150px' }"
        appendTo="body"
        bindLabel="label"
        bindValue="value"
        ngbTooltip="Filtre lots"
        placeholder="Tous"
        [small]="true"
      />

      <app-select
        (selectionChange)="onStorageFilterChange()"
        [(ngModel)]="selectedStorageId"
        [items]="storages()"
        [clearable]="true"
        [style]="{ width: '160px' }"
        appendTo="body"
        bindLabel="name"
        bindValue="id"
        ngbTooltip="Emplacement"
        placeholder="Emplacement"
        [small]="true"
      />

      @if (rayons().length > 0) {
        <app-select
          (selectionChange)="onRayonFilterChange()"
          [(ngModel)]="selectedRayonId"
          [items]="rayons()"
          [clearable]="true"
          [style]="{ width: '140px' }"
          appendTo="body"
          bindLabel="libelle"
          bindValue="id"
          ngbTooltip="Rayon"
          placeholder="Rayon"
          [small]="true"
        />
      }

    </div>
  </div>

  <ag-grid-angular
    (cellValueChanged)="onCellValueChanged($event)"
    (gridReady)="onGridReady($event)"
    [animateRows]="true"
    [columnDefs]="columnDefs()"
    [defaultColDef]="defaultColDef"
    [enableCellEditingOnBackspace]="true"
    [enterNavigatesVerticallyAfterEdit]="true"
    [readOnlyEdit]="false"
    [rowData]="lots()"
    [singleClickEdit]="true"
    [stopEditingWhenCellsLoseFocus]="true"
    [suppressScrollOnNewData]="true"
    [theme]="theme"
    style="width: 100%; height: 100%;"
  />

  @if (loading()) {
    <div class="lot-loading">
      <i class="pi pi-spin pi-spinner"></i> Chargement...
    </div>
  }
</div>
