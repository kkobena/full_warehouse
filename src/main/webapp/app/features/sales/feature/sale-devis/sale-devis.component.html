<!-- Notifications Toast -->
<p-toast position="center" />

<!-- Content spécifique DEVIS -->
<!-- 1ère ligne: Barre recherche client (ligne entière) -->
<div class="devis-customer-section">
  <div class="customer-search-wrapper">
    <!-- Search Section -->
    <div class="search-section">
      <p-iconfield class="search-input-wrapper">
        <p-inputicon class="pi pi-search"/>
        <input #searchInput
               (keydown.enter)="onSearchCustomer()"
               [(ngModel)]="search"
               autocomplete="off"
               class="search-input"
               pInputText
               [fluid]="true"
               placeholder="Rechercher un client..."
               type="text"/>
      </p-iconfield>
      <p-button
        (onClick)="onOpenCustomerList()"
        icon="pi pi-list"
        pTooltip="Liste des clients"
        severity="secondary"
        size="small"
        [rounded]="true"/>
      <p-button
        (onClick)="onAddCustomer()"
        icon="pi pi-user-plus"
        pTooltip="Nouveau client"
        severity="success"
        size="small"
        [rounded]="true"/>
    </div>

    <!-- Customer Information Card -->
    @if (selectedCustomer()) {
      <div class="customer-info-card">
        <div class="card-header">
          <div class="header-title">
            <i class="pi pi-user"></i>
            <span>Client</span>
          </div>
          <p-button
            (onClick)="onEditCustomer()"
            pTooltip="Modifier les infos du client"
            icon="pi pi-user-edit"
            severity="info"
            size="small"
            [rounded]="true"/>
        </div>
        <div class="card-body">
          <div class="info-row">
            <span class="info-label">Nom/Prénom(s)</span>
            <span class="info-value">
              {{ selectedCustomer().firstName }}
              {{ selectedCustomer().lastName }}
            </span>
          </div>
          @if (selectedCustomer().phone) {
            <div class="info-row">
              <span class="info-label">Téléphone</span>
              <span class="info-value">{{ selectedCustomer().phone }}</span>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>

<!-- 2ème ligne: Recherche produit (ligne entière) -->
<app-product-search-section
  #produitbox
  [autofocus]="false"
  [selectedProduct]="selectedProduct()"
  [saleType]="'COMPTANT'"
  [requiresCustomer]="true"
  [showStock]="showStock()"
  [hasCustomer]="hasCustomer()"
  (productSelected)="onProductSelected($event)"
  (productScanned)="onProductScanned($event)"
  (onKeyEnter)="onProductSearchEnter($event)"
  (addQuantite)="onAddQuantity($event)">
</app-product-search-section>

<!-- 3ème ligne: Tableau produit (gauche) + Sale summary (droite) -->
@if (currentSale()) {
  <div class="row">
    <div class="col-lg-9 col-sm-12 col-md-12 col-xl-9 col-xxl-9">
      <app-product-list
        [salesLines]="salesLines()"
        [isEditable]="!isSaving()"
        [selectedLineId]="selectedLineId()"
        [saleId]="currentSale()?.id"
        [saleType]="'COMPTANT'"
        [remises]="remises()"
        [currentRemise]="currentSale()?.remise"
        [showRemiseSection]="true"
        (quantityChanged)="onLineQuantityChanged($event)"
        (quantityRequestedChanged)="onLineQuantityRequestedChanged($event)"
        (lineRemoved)="onLineRemoved($event)"
        (lineSelected)="onLineSelected($event)"
        (authorizationRequired)="onAuthorizationRequired($event)"
        (remiseSelected)="onRemiseSelected($event)"
        (removeRemise)="onRemoveRemise()"
        (remiseActionCancelled)="focusProductSearch()" />
    </div>

    <div class="amounts-summary col-lg-3 col-sm-12 col-md-12 col-xl-3 col-xxl-3">
      <div class="grid">
        <div class="col-12">
          <app-sale-summary
            [totalAmount]="currentSale()?.salesAmount || 0"
            [discountAmount]="currentSale()?.discountAmount || 0"
            [taxAmount]="currentSale()?.taxAmount || 0"
            [netAmount]="currentSale()?.netAmount || 0"
            [amountToBePaid]="currentSale()?.amountToBePaid || 0"
            [itemCount]="salesLines().length"
            [currentRemise]="currentSale()?.remise"
            [isAvoir]="isAvoir()"
            [saleType]="'COMPTANT'" />
        </div>
        <div class="col-12 d-flex justify-content-center">
          <app-sale-actions
            [saleType]="'COMPTANT'"
            [canSave]="canSave()"
            [canSaveAsPresale]="canSave()"
            [canCancel]="true"
            [isSaving]="isSaving()"
            [isPresale]="true"
            [isDevis]="true"
            [isSmallScreen]="isSmallScreen()"
            (save)="onSaveAsDevis()"
            (putOnHold)="onPutOnHold()"
            (saveAsPresale)="onSaveAsDevis()"
            (cancel)="onCancel()" />
        </div>
      </div>
    </div>
  </div>

  <!-- Pas de section paiement pour les devis -->
} @else {
  <div class="empty-cart-state">
    <div class="empty-cart-icon">
      <i class="pi pi-shopping-cart"></i>
    </div>
    <h3>Panier vide</h3>
    <p>Sélectionnez un client et ajoutez des produits</p>
  </div>
}

<!-- Confirm Dialog -->
<jhi-confirm-dialog #confirmDialog />
<!-- Spinner global -->
<ngx-spinner [fullScreen]="true" bdColor="rgba(255,255,255,0.5)" color="#f13151" name="sale-spinner" size="medium" type="timer"></ngx-spinner>
