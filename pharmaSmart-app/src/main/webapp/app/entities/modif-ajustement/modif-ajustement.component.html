<div class="container">
  <div class="justify-content-center">
    <div class="pharma-smart-content p-2">
      <div class="pharma-toolbar">
        <div class="pharma-toolbar-header">
          <i class="pi pi-sliders-h"></i>
          <span class="pharma-toolbar-title">Liste des motifs d'ajustement</span>
        </div>

        <div class="pharma-toolbar-content">
          <div class="pharma-toolbar-filters">
            <div class="pharma-search-input">
              <app-icon-field [overlay]="true" icon="pi pi-search">
                <input (keyup.enter)="search($event)" class="form-control"
                       placeholder="Taper pour rechercher" type="text" />
              </app-icon-field>
            </div>
          </div>

          <div class="pharma-toolbar-actions">
            <div class="pharma-button-group">
              <app-button (clicked)="addNewEntity()" [raised]="true" icon="pi pi-check" label="Nouveau" severity="success" />
            </div>
          </div>
        </div>
      </div>

      <div class="mt-2">
        @if (entites && entites.length > 0) {
          <app-data-table
            (onLazyLoad)="lazyLoading($event)"
            [lazy]="true"
            [loading]="loading"
            [paginator]="true"
            [rows]="itemsPerPage"
            [size]="'small'"
            [stripedRows]="true"
            [totalRecords]="totalItems"
            [value]="entites"
            dataKey="id"
          >
            <ng-template #header>
              <tr class="pharma-table-head">
                <th scope="col"><span>Libellé</span></th>
                <th scope="col"></th>
              </tr>
            </ng-template>
            <ng-template #body let-elRow>
              <tr>
                <td>
                  <span class="pharma-entity-name">{{ elRow.libelle }}</span>
                </td>
                <td style="text-align: right">
                  <app-button (clicked)="onEdit(elRow)" [iconOnly]="true" [rounded]="true" [text]="true"
                              ariaLabel="Modifier" icon="pi pi-pencil" severity="success" size="small" />
                  <app-button (clicked)="delete(elRow)" [iconOnly]="true" [rounded]="true" [text]="true"
                              ariaLabel="Supprimer" icon="pi pi-trash" severity="danger" size="small" />
                </td>
              </tr>
            </ng-template>
          </app-data-table>
        } @else {
          <div class="alert alert-warning" id="no-result">
            <span>Aucune donnée trouvée</span>
          </div>
        }
      </div>
    </div>
  </div>
</div>
