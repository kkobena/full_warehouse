<table xmlns:th="http://www.thymeleaf.org" class="main-table">
  <thead>
    <tr>
      <th class="text-center" style="width: 4%">#</th>
      <th class="text-left" style="width: 12%">CIP</th>
      <th class="text-left" style="width: 36%">PRODUIT</th>
      <th class="text-left" style="width: 12%">N° LOT</th>
      <th class="text-right" style="width: 10%">QTÉ RETOURNÉE</th>
      <th class="text-right" style="width: 10%">QTÉ ACCEPTÉE</th>
      <th class="text-left" style="width: 16%">MOTIF DE RETOUR</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="itm,itmStat : ${retourBonItems}">
      <td class="text-center" th:text="${itmStat.index + 1}"></td>
      <td class="text-left" th:text="${itm.produitCip}"></td>
      <td class="text-left" th:text="${itm.produitLibelle}"></td>
      <td class="text-left" th:text="${itm.lotNumero}"></td>
      <td class="qty" th:text="${#numbers.formatInteger(itm.qtyMvt, 1, 'WHITESPACE')}"></td>
      <td class="qty">
        <span th:if="${itm.acceptedQty ne null}"
              th:text="${#numbers.formatInteger(itm.acceptedQty, 1, 'WHITESPACE')}"></span>
        <span th:if="${itm.acceptedQty == null}">—</span>
      </td>
      <td class="text-left" th:text="${itm.motifRetourLibelle}"></td>
    </tr>
  </tbody>
  <tfoot th:if="${isLastPage}">
    <tr>
      <td class="text-left" colspan="3">
        NOMBRE DE PRODUITS :
        <strong th:text="${item_size}"></strong>
      </td>
      <td></td>
      <td class="qty">
        <strong th:text="${#aggregates.sum(retourBonItems.![qtyMvt])}"></strong>
      </td>
      <td class="qty">
        <strong th:text="${#aggregates.sum(retourBonItems.![acceptedQty ?: 0])}"></strong>
      </td>
      <td></td>
    </tr>
  </tfoot>
</table>

<div th:if="${isLastPage}" style="margin-top: 20px; page-break-inside: avoid">
  <table style="width: 100%; border-collapse: collapse">
    <tbody>
      <tr>
        <td style="width: 55%; vertical-align: top">
          <div th:if="${retourBon.commentaire ne null and !#strings.isEmpty(retourBon.commentaire)}"
               style="border: 0.5px solid #ccc; padding: 6px; font-size: 8px">
            <strong>Commentaire :</strong><br />
            <span th:text="${retourBon.commentaire}"></span>
          </div>
        </td>
        <td style="width: 45%; text-align: center; vertical-align: bottom; font-size: 8px">
          <div style="border-top: 0.5px solid #333; margin-top: 35px; padding-top: 4px">
            Signature et cachet du pharmacien
          </div>
        </td>
      </tr>
    </tbody>
  </table>
  <div style="margin-top: 10px; text-align: center; font-size: 7px; color: #777">
    TOUS LES MONTANTS SONT EXPRIMES EN
    <span th:text="${devise}"></span>
  </div>
</div>
