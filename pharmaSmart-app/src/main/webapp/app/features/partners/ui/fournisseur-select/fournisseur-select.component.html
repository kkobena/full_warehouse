@if (multiple()) {
  <app-float-label label="{{ placeholder() }}" inputId="fournisseur-multi-select">
    <app-multi-select
      inputId="fournisseur-multi-select"
      [(ngModel)]="selectedMultiple"
      (ngModelChange)="onMultiChange($event)"
      [items]="grouped() ? groupedFournisseurs() : fournisseurs()"
      [groupBy]="grouped() ? 'groupLabel' : ''"
      [groupValueFn]="grouped() ? groupValueFn : undefined"
      [groupTemplate]="grouped() ? groupHeader : undefined"
      bindLabel="libelle"
      [clearable]="showClear()"
      [disabled]="disabled()"
      [appendTo]="appendTo() ?? ''"
      [style]="{ width: '100%' }"
    />
  </app-float-label>
} @else {
  <app-float-label label="{{ placeholder() }}" inputId="fournisseur-select">
    <app-select-search
      inputId="fournisseur-select"
      [(ngModel)]="selectedSingle"
      (ngModelChange)="onSingleChange($event)"
      [items]="grouped() ? groupedFournisseurs() : fournisseurs()"
      [groupBy]="grouped() ? 'groupLabel' : ''"
      [groupValueFn]="grouped() ? groupValueFn : undefined"
      [groupTemplate]="grouped() ? groupHeader : undefined"
      bindLabel="libelle"
      [clearable]="showClear()"
      [disabled]="disabled()"
      [appendTo]="appendTo() ?? ''"
      [style]="{ width: '100%' }"
    />
  </app-float-label>
}

<ng-template #groupHeader let-grp>
  <div class="fournisseur-group-header" [class.fournisseur-group-header--standalone]="!grp.hasChildren">
    <i [class]="grp.hasChildren ? 'pi pi-sitemap' : 'pi pi-building'"></i>
    <span>{{ grp.label }}</span>
  </div>
</ng-template>
