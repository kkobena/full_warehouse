<div class="container-fluid">
  <div class="pharma-smart-content">
    <!-- HEADER TOOLBAR -->
    <div class="pharma-toolbar">
      <div class="pharma-toolbar-header">
        <i class="pi pi-tags"></i>
        <span class="pharma-toolbar-title">Motifs de Retour Produit</span>
      </div>

      <div class="pharma-toolbar-content">
        <div class="pharma-toolbar-filters">
          <div class="pharma-search-input"></div>
        </div>

        <div class="pharma-toolbar-actions">
          <div class="pharma-button-group">
            <app-button (clicked)="openNew()" [raised]="true" icon="pi pi-plus" label="Nouveau motif"
                        severity="primary" size="small" />
          </div>
        </div>
      </div>
    </div>

    <!-- DATA TABLE -->
    <div class="table-section">
      <app-data-table [loading]="loading()" [rows]="itemsPerPage" [size]="'small'" [value]="motifRetours()" dataKey="id">
        <ng-template #header>
          <tr class="pharma-table-head">
            <th>Libellé</th>
            <th style="width: 150px; text-align: center">Actions</th>
          </tr>
        </ng-template>

        <ng-template #body let-motif>
          <tr>
            <td>
              <span class="motif-label">{{ motif.libelle }}</span>
            </td>
            <td style="text-align: center">
              <div class="action-buttons">
                <app-button (clicked)="edit(motif)" [iconOnly]="true" [rounded]="true" [text]="true"
                            ariaLabel="Modifier" icon="pi pi-pencil" ngbTooltip="Modifier" placement="top"
                            severity="info" size="small" />
                <app-button (clicked)="confirmDelete(motif)" [iconOnly]="true" [rounded]="true" [text]="true"
                            ariaLabel="Supprimer" icon="pi pi-trash" ngbTooltip="Supprimer" placement="top"
                            severity="danger" size="small" />
              </div>
            </td>
          </tr>
        </ng-template>

        <ng-template #emptymessage>
          <tr>
            <td class="text-center" colspan="2">
              <div class="empty-state">
                <i class="pi pi-inbox"></i>
                <p>Aucun motif de retour trouvé</p>
              </div>
            </td>
          </tr>
        </ng-template>
      </app-data-table>
    </div>
  </div>
</div>
