<app-card [variant]="'form'" [withHeader]="true">
  <div ngProjectAs="[cardHeader]" class="section-header">
      <i class="pi pi-shield"></i>
      <span>Assurances Complémentaires</span>
      @if (validSize) {
        <app-button
          (click)="addTiersPayant()"
          [rounded]="true"
          class="ml-auto"
          icon="pi pi-plus"
          ngbTooltip="Ajouter un tiers payant"
          severity="info"
          size="small"
          type="button"
        >
        </app-button>
      }
    </div>

  <form [formGroup]="editForm" name="editForm">
    <div class="complementaire-grid">
      @for (tiersPayant of editFormGroups.controls; track i; let i = $index) {
        <div class="complementaire-card" formArrayName="tiersPayants">
          <ng-container [formGroupName]="i">
            <div class="complementaire-card-header">
              <span class="complementaire-card-title">Assurance #{{ i + 1 }}</span>
              <app-button
                (click)="confirmRemove(i)"
                [rounded]="true"
                [text]="true"
                icon="pi pi-times"
                ngbTooltip="Supprimer"
                severity="danger"
                size="small"
                type="button"
              >
              </app-button>
            </div>

            <div class="complementaire-card-body">
              <input formControlName="id" name="id" type="hidden" />

              <div class="form-grid-compact">
                <!-- Tiers-payant -->
                <div class="form-field form-field-full">
                  <label>Tiers-payant <span class="required">*</span></label>
                  <app-select-search
                    appendTo="body"
                    (searched)="searchTiersPayant($event)"
                    (selectionChange)="onSelectTiersPayant($event, i)"
                    [minSearchLength]="minLength"
                    [items]="tiersPayants"
                    formControlName="tiersPayant"
                    bindLabel="fullName"
                    placeholder="Taper pour rechercher"
                  />
                </div>

                <!-- Numéro de sécurité -->
                <div class="form-field">
                  <label>Numéro de sécurité <span class="required">*</span></label>
                  <input autocomplete="off" class="form-control" formControlName="num"
                         [appKeyFilter]="'alphanum'" />
                </div>

                <!-- Taux -->
                <div class="form-field">
                  <label>Taux (%) <span class="required">*</span></label>
                  <input autocomplete="off" class="form-control" formControlName="taux"
                         [appKeyFilter]="'int'" />
                </div>

                <!-- Ordre -->
                <div class="form-field">
                  <label>Ordre <span class="required">*</span></label>
                  <app-select
                    [items]="catgories"
                    appendTo="body"
                    formControlName="priorite"
                    bindLabel="label"
                    bindValue="value"
                  >
                  </app-select>
                </div>
              </div>
            </div>
          </ng-container>
        </div>
      }
    </div>
  </form>
</app-card>
