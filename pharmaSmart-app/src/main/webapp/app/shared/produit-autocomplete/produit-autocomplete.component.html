<p-floatlabel variant="on">
  <p-autocomplete
    #produitbox
    [(ngModel)]="produitSelected"
    (completeMethod)="searchFn($event)"
    (onKeyUp)="onKeyDown($event)"
    (onSelect)="onSelect()"
    (onClear)="clear($event)"
    [appendTo]="APPEND_TO"
    [autofocus]="autofocus()"
    [dataKey]="'id'"
    [dropdown]="false"
    [autoHighlight]="true"
    [autoOptionFocus]="true"
    [emptyMessage]="PRODUIT_NOT_FOUND"
    [inputStyle]="inputStyle()"
    [minQueryLength]="PRODUIT_COMBO_MIN_LENGTH"
    [showClear]="showClear()"
    [showEmptyMessage]="true"
    [style]="style()"
    [suggestions]="produits()"
    [fluid]="true"
    id="produits"
    optionLabel="libelle"
    size="large"
  >
    <ng-template #item let-item>
      <div [style]="{ width: '100%' }">
        <span [class.stockless]="item.totalQuantity <= 0" style="width: 20%; display: inline-block">
          {{ item.fournisseurProduit?.codeCip }}
        </span>
        <span [class.stockless]="item.totalQuantity <= 0">
          {{ item.libelle }}
        </span>
        <span [class.stockless]="item.totalQuantity <= 0" class="float-right">
          {{ item.regularUnitPrice | number }}
        </span>
      </div>
    </ng-template>
  </p-autocomplete>
  <label for="produits">
    {{ 'warehouseApp.labels.produits' | translate }}
  </label>
</p-floatlabel>
