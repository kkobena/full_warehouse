<div class="modal-header">
  <h4 class="modal-title">Annulation de vente</h4>
  <button (click)="cancel()" class="btn-close" data-dismiss="modal" type="button">&times;</button>
</div>

<form (ngSubmit)="save()" [formGroup]="form" name="form" novalidate role="form">
  <div class="modal-body">
    <app-card [variant]="'form'">
      <div class="form-grid-compact">

        <div class="form-field form-field-full">
          <label for="field_name">Raison d'annulation de la vente<span class="required">*</span></label>
          <input #cancelComment autocomplete="off" class="form-control w-100" formControlName="cancelComment" id="field_name" name="cancelComment" type="text" />
          @if (form.get('cancelComment')!.invalid && (form.get('cancelComment')!.dirty || form.get('cancelComment')!.touched)) {
            <div>
              @if (form.get('cancelComment')?.errors?.required) {
                <small class="form-text text-danger" > Le champ est obligatoire. </small>
              }
            </div>
          }
        </div>

      </div>
    </app-card>
  </div>

  <div class="modal-footer">
    <app-button
      (clicked)="cancel()"
      [raised]="true"
      class="mr-2"
      icon="pi pi-times"
      label="Annuler"
      severity="secondary"
      type="button"
    ></app-button>
    <app-button
      [disabled]="form.invalid || isSaving"
      [raised]="true"
      icon="pi pi-check"
      label="Enregistrer"
      severity="success"
      type="submit"
    ></app-button>
  </div>
</form>
