<app-toolbar icon="pi pi-sync" title="Pilotage des stocks">
  <ng-container ngProjectAs="[toolbarFilters]">
    @if (activeTab === 'historique') {
      <app-icon-field [overlay]="true" icon="pi pi-search">
        <input (keyup.enter)="onSearch()" [(ngModel)]="search" class="form-control"
               placeholder="Produit, opérateur…" type="text" />
      </app-icon-field>
      <pharma-date-picker
        (selectionChange)="onSearch()"
        [(ngModel)]="dtStart"
        id="dtStart"
        label="Date début"
      />
      <pharma-date-picker
        (selectionChange)="onSearch()"
        [(ngModel)]="dtEnd"
        id="dtEnd"
        label="Date fin"
      />
      <app-select
        (selectionChange)="onSearch()"
        [(ngModel)]="filterTypeRepartition"
        [clearable]="false"
        [items]="typeRepartitionOptions"
        appendTo="body"
        bindLabel="label"
        bindValue="value"
        inputId="filterType"
        placeholder="Type de mouvement"
      />
      @if (users.length > 1) {
        <app-select
          (selectionChange)="onSearch()"
          [(ngModel)]="filterUserId"
          [clearable]="true"
          [items]="users"
          appendTo="body"
          bindLabel="login"
          bindValue="id"
          inputId="filterUser"
          placeholder="Opérateur"
        />
      }
      @if (storages.length > 1) {
        <app-select
          (selectionChange)="onSearch()"
          [(ngModel)]="filterStorageId"
          [clearable]="true"
          [items]="storages"
          appendTo="body"
          bindLabel="name"
          bindValue="id"
          inputId="filterStorage"
          placeholder="Emplacement"
        />
      }
    }
  </ng-container>

  <ng-container ngProjectAs="[toolbarActions]">
    <div class="pharma-button-group">
      @if (activeTab === 'historique') {
        <app-button (clicked)="onSearch()" icon="pi pi-search" label="Rechercher" severity="info"
                    size="small" />
        <app-button (clicked)="exportToPdf()" icon="pi pi-file-pdf" label="Exporter PDF"
                    severity="warn" size="small" />
        <app-button (clicked)="onResetFilters()" [rounded]="true"
                    [text]="true" icon="pi pi-filter-slash" ngbTooltip="Réinitialiser" placement="left"
                    severity="secondary" size="small" />
      }
    </div>
  </ng-container>
</app-toolbar>

<div class="pharma-nav-tabs-container">
  <div
    #nav="ngbNav"
    (navChange)="onTabChange($event)"
    [(activeId)]="activeTab"
    class="nav pharma-nav-tabs"
    ngbNav
    orientation="horizontal"
  >
    <ng-container ngbNavItem="historique">
      <a class="pharma-nav-tab-link" ngbNavLink>
        <i class="pi pi-history"></i>
        <span>Traçabilité</span>
      </a>
      <ng-template ngbNavContent>
        <app-repartition-list
          [fromDate]="dtStart"
          [searchTerm]="search"
          [storageId]="filterStorageId"
          [toDate]="dtEnd"
          [typeRepartition]="filterTypeRepartition"
          [userId]="filterUserId"
        />
      </ng-template>
    </ng-container>

    <ng-container ngbNavItem="rayon">
      <a class="pharma-nav-tab-link" ngbNavLink>
        <i class="pi pi-shopping-cart"></i>
        <span>Réassort suggéré – Rayon</span>
      </a>
      <ng-template ngbNavContent>
        <app-suggestion-reassort #suggestionRayon [typeReassort]="'RAYON'" />
      </ng-template>
    </ng-container>

    <ng-container ngbNavItem="reserve">
      <a class="pharma-nav-tab-link" ngbNavLink>
        <i class="pi pi-warehouse"></i>
        <span>Réassort suggéré – Réserve</span>
      </a>
      <ng-template ngbNavContent>
        <app-suggestion-reassort #suggestionReserve [typeReassort]="'RESERVE'" />
      </ng-template>
    </ng-container>

    <ng-container ngbNavItem="manual">
      <a class="pharma-nav-tab-link" ngbNavLink>
        <i class="pi pi-cog"></i>
        <span>Transfert manuel stock Rayon / Réserve</span>
      </a>
      <ng-template ngbNavContent>
        <app-manual-repartition />
      </ng-template>
    </ng-container>
  </div>
  <div class="pharma-nav-tabs-outlet">
    <div [ngbNavOutlet]="nav"></div>
  </div>
</div>
