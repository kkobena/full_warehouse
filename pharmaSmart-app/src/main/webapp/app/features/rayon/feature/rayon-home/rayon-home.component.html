<div class="pharma-smart-content p-1">
  <!-- Toolbar -->
  <app-toolbar icon="pi pi-tag" title="Rayons" [compact]="true">
    <ng-container ngProjectAs="[toolbarFilters]">
      <div class="pharma-toolbar-filters">
        <app-float-label label="Emplacement" inputId="rhStorage">
          <app-select
            [(ngModel)]="selectedStorage"
            [items]="storages"
            bindLabel="storageType"
            [clearable]="true"
            (selectionChange)="onStorageChange()"
            appendTo="body"
            inputId="rhStorage"
            [style]="{ width: '180px' }"
          />
        </app-float-label>

        <app-float-label label="Type de zone" inputId="rhTypeZone">
          <app-select
            [(ngModel)]="selectedTypeZone"
            [items]="typeZoneOptions"
            bindLabel="label"
            bindValue="value"
            [clearable]="true"
            (selectionChange)="onSearch()"
            appendTo="body"
            inputId="rhTypeZone"
            [style]="{ width: '140px' }"
          />
        </app-float-label>

        <div class="pharma-compact-search">
          <app-icon-field icon="pi pi-search">
            <input
              class="form-control"
              [(ngModel)]="search"
              (keyup.enter)="onSearch()"
              placeholder="Rechercher…"
            />
          </app-icon-field>
        </div>
      </div>
    </ng-container>

    <ng-container ngProjectAs="[toolbarActions]">
      <div class="pharma-toolbar-actions">
        <div class="pharma-button-group">
          <app-button
            (clicked)="exportCsv()"
            icon="pi pi-download"
            label="Exporter"
            severity="secondary"
            ngbTooltip="Exporter"
            placement="left"
            [raised]="true"
          />
          <app-button
            (clicked)="cloneRayons()"
            icon="pi pi-copy"
            label="Cloner"
            severity="info"
            [raised]="true"
            ngbTooltip="Cloner"
            placement="left"
            [disabled]="!rayons().length"
          />
          <app-button
            (clicked)="showFileDialog()"
            icon="pi pi-upload"
            label="Importer rayons"
            ngbTooltip="Importer rayons"
            placement="left"
            severity="warn"
            [raised]="true"
          />
          <app-button
            (clicked)="importRayonProduits()"
            icon="pi pi-link"
            label="Importer affectations"
            ngbTooltip="Importer affectations-CSV : code_cip ; code_rayon"
            placement="left"
            severity="help"
            [raised]="true"
            [disabled]="!selectedStorage"
          />
          <app-button
            (clicked)="addNew()"
            icon="pi pi-plus"
            label="Nouveau"
            severity="success"
            [raised]="true"
            ngbTooltip="Nouveau"
            placement="left"
          />
        </div>
      </div>
    </ng-container>
  </app-toolbar>

  <!-- Split container -->
  <div class="split-container" [class.panel-open]="panelOpen()">
    <div class="list-column">
      <app-rayon-list
        [rayons]="rayons()"
        [totalItems]="totalItems()"
        [loading]="loading()"
        [rows]="rows"
        [first]="page * rows"
        [selectedRayon]="selectedRayon()"
        (rayonSelected)="onRayonSelected($event)"
        (lazyLoad)="onLazyLoad($event)"
        (editRequested)="onEditRequested($event)"
        (deleteRequested)="onDeleteRequested($event)"
        (inventaireRequested)="onInventaireRequested($event)"
        (cloneRequested)="onCloneRequested($event)"
      />
    </div>

    @if (panelOpen()) {
      <div class="detail-column">
        <app-rayon-detail-panel
          [rayon]="selectedRayon()!"
          (closed)="onClosePanel()"
          (edited)="onRayonEdited($event)"
          (deleteRequested)="onDeleteRequested($event)"
        />
      </div>
    }
  </div>
</div>
