<!-- Skip navigation link (WCAG 2.4.1) -->
<a href="#main-content" class="skip-link">Aller au contenu principal</a>

<!-- Custom Titlebar (Tauri only) -->
@if (isTauriMode) {
  <app-titlebar></app-titlebar>
}

<!-- Conditional Layout: Navbar or Sidebar -->
<!-- Navbar Layout (Horizontal) -->
@if (layoutService.isNavbarMode()) {
  <div class="sticky-navbar">
    <router-outlet name="navbar"></router-outlet>
  </div>
}

<!-- Sidebar Layout (Vertical) -->
@if (layoutService.isSidebarMode()) {
  <div>
    <router-outlet name="sidebar"></router-outlet>
  </div>
}

<!-- Main Content Area -->
<div
  id="main-content"
  [class.sidebar-collapsed]="layoutService.isSidebarMode() && layoutService.sidebarCollapsed()"
  [class.with-navbar]="layoutService.isNavbarMode()"
  [class.with-sidebar]="layoutService.isSidebarMode()"
  class="main-content"
>
  <app-breadcrumb></app-breadcrumb>
  <div class="container-fluid">
    <div class="card mt-2 main border border-0">
      <div class="card-body main-card-body">
        <p-confirmdialog [style]="{ width: '40vw' }" class="ws-dialog"></p-confirmdialog>

        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>

@if (isTauriMode) {
  <jhi-backend-splash></jhi-backend-splash>
}
