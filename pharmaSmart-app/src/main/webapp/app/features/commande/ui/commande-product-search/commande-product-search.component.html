<app-float-label label="Produit" inputId="produitbox">
  <app-select-search
    #produitbox
    [(ngModel)]="produitSelected"
    (ngModelChange)="onNgModelChange($event)"
    [items]="produits()"
    [typeahead]="typeaheadSink$"
    (searched)="searchFn($event)"
    (selectionChange)="onSelect()"
    (keydown)="onKeyDown($event)"
    [minSearchLength]="PRODUIT_COMBO_MIN_LENGTH"
    typeToSearchText="Tapez au moins {{ PRODUIT_COMBO_MIN_LENGTH }} caractères (code CIP ou libellé)…"
    bindLabel="libelle"
    [appendTo]="APPEND_TO"
    [clearable]="true"
    [disabled]="disabled()"
    inputId="produitbox"
    placeholder=" "
    class="w-100 pharma-autocomplete"
    [optionTemplate]="produitItem"
  />
  <ng-template #produitItem let-item>
    <div class="commande-search-item" [class.stockless]="item.totalQuantity <= 0">
      <span class="pharma-code">{{ item.fournisseurProduit?.codeCip }}</span>
      <span class="item-libelle">{{ item.libelle }}</span>
      <span class="item-price">{{ item.regularUnitPrice | number }} F</span>
    </div>
  </ng-template>
</app-float-label>
