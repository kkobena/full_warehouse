<div class="pharma-smart-content p-2">
    <app-toolbar icon="pi pi-th-large" title="Dashboard Personnalisable" [compact]="true">
      <ng-container ngProjectAs="[toolbarFilters]">
        <div class="pharma-toolbar-filters d-flex gap-2 align-items-center">
          @if (currentLayout(); as layout) {
            <div class="d-flex align-items-center gap-2">
              <span class="text-muted">Layout actuel:</span>
              <app-badge [label]="layout.name || 'Sans nom'" severity="info" />
            </div>
          }
        </div>
      </ng-container>

      <ng-container ngProjectAs="[toolbarActions]">
        <div class="pharma-toolbar-actions flex gap-2">
          <app-button
            [label]="isEditMode() ? 'Mode Vue' : 'Mode Édition'"
            [icon]="isEditMode() ? 'pi pi-eye' : 'pi pi-pencil'"
            (clicked)="toggleEditMode()"
            size="small"
            [severity]="isEditMode() ? 'warn' : 'secondary'"
          />

          @if (isEditMode()) {
            <app-button label="Ajouter Widget" icon="pi pi-plus" (clicked)="addWidget()" size="small" />
          }

          <app-button label="Sauvegarder" icon="pi pi-save" (clicked)="saveLayout()" size="small" severity="success" />

          <app-button label="Charger" icon="pi pi-folder-open" (clicked)="openLoadLayoutModal()" size="small" />
        </div>
      </ng-container>
    </app-toolbar>

  <!-- Edit Mode Alert -->
  @if (isEditMode()) {
    <div class="mb-3">
      <div class="edit-mode-alert">
        <div class="d-flex align-items-center gap-2">
          <i class="pi pi-info-circle alert-icon"></i>
          <div class="alert-content">
            <strong class="alert-title">Mode Édition activé</strong>
            <p class="alert-text">
              Vous pouvez déplacer et redimensionner les widgets. Cliquez sur "Sauvegarder" pour enregistrer vos modifications.
            </p>
          </div>
        </div>
      </div>
    </div>
  }

  <!-- GridStack Container -->
  <div class="grid-stack-wrapper">
    <div #gridContainer class="grid-stack"></div>
  </div>
</div>
