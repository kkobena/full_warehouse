
<div class="err-wrapper">
  <div class="err-card">

    <div class="err-code">{{ errorCode() }}</div>

    <div class="err-icon-ring">
      <i [class]="errorIcon()"></i>
    </div>

    <h2 class="err-title">{{ errorTitle() }}</h2>

    @if (errorMessage(); as msg) {
      <p class="err-msg">{{ msg }}</p>
    }

    <div class="err-sep"></div>

    <div class="err-actions">
      <button class="err-btn err-btn-secondary" type="button" (click)="goBack()">
        <i class="pi pi-arrow-left"></i>
        <span>Retour</span>
      </button>
      <button class="err-btn err-btn-primary" type="button" (click)="goHome()">
        <i class="pi pi-home"></i>
        <span>Accueil</span>
      </button>
    </div>

  </div>
</div>
