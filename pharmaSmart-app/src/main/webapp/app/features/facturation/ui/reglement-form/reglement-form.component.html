<form (ngSubmit)="save()" [formGroup]="reglementForm" class="reglement-form">

  <!-- Grille inline : tous les champs sur une ligne -->
  <div class="form-grid">

    @if (showPartialToggle()) {
      <div class="toggle-field">
        <app-switch formControlName="partialPayment" inputId="partialPayment" />
        <label for="partialPayment">Tout régler</label>
      </div>
    }
    <app-input-number
      [readonly]="isReadOnly"
      [inputClass]="'amount-input'"
      formControlName="amount"
      placeholder="Montant"
    />


    <app-select size="small"
              appendTo="body"
              [items]="paymentModes"
              formControlName="modePaimentCode"
              bindLabel="libelle"
              bindValue="code"
              placeholder="Mode de paiement"
    />
    <pharma-date-picker [maxDate]="maxDate" formControlName="paymentDate" id="datePaiement"
                        label="Date paiement" />


    <app-button
      [disabled]="!valid || !validMontantSaisi() || isSaving()"
      [loading]="isSaving()"
      icon="pi pi-check"
      label="Valider"
      size="small"
      severity="success"
      type="submit"
    />

  </div>

  <!-- Infos bancaires (si chèque / virement) -->
  @if (showBanqueInfo) {
    <div class="bank-fields" formGroupName="banqueInfo">
      <input formControlName="nom" placeholder="Nom de la banque" class="form-control" />
      @if (reglementForm.get('modePaimentCode')!.value === CH) {
        <input formControlName="code" [appKeyFilter]="'alphanum'" placeholder="N° chèque" class="form-control" />
      }
      <input formControlName="beneficiaire" placeholder="Bénéficiaire" class="form-control" />
    </div>
  }

</form>
