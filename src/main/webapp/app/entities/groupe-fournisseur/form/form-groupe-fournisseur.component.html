<div class="modal-header">
  <h4 class="modal-title">{{ header }}</h4>
  <button (click)="cancel()" class="btn-close" data-dismiss="modal" type="button">&times;</button>
</div>
<form (ngSubmit)="save()" [formGroup]="editForm" name="editForm" novalidate role="form">
  <div class="modal-body">
    <p-card>
      <div class="form-grid-compact">
        <div [hidden]="!editForm.get('id')!.value" class="form-group">
          <input class="form-control" formControlName="id" id="id" name="id" readonly type="hidden" />
        </div>
        <div class="form-field form-field-full">
          <label for="field_libelle">Libellé<span class="required">*</span></label>

          <input #libelleInput autocomplete="off" class="w-full" formControlName="libelle" id="field_libelle" name="libelle" pInputText />

          @let libelle = editForm.get('libelle');
          @if (libelle!.invalid && (libelle!.dirty || libelle!.touched)) {
            <div>
              @if (libelle?.errors?.required) {
                <small class="form-text text-danger" style="color: red"> Ce champ est obligatoire. </small>
              }
            </div>
          }
        </div>

        <div class="form-field form-field-full">
          <label for="field_urlPharmaMl">Url PharmaMl</label>

          <input
            [pKeyFilter]="blockSpace"
            autocomplete="off"
            formControlName="urlPharmaMl"
            id="field_urlPharmaMl"
            name="urlPharmaMl"
            pInputText
            class="w-full"
            type="text"
          />
        </div>

        <div class="form-field form-field-full">
          <label for="field_codeOfficePharmaMl">Code officine PharmaMl</label>

          <input
            [pKeyFilter]="blockSpace"
            autocomplete="off"
            formControlName="codeOfficePharmaMl"
            id="field_codeOfficePharmaMl"
            name="codeOfficePharmaMl"
            pInputText
            class="w-full"
            type="text"
          />
        </div>

        <div class="form-field form-field-full">
          <label for="field_codeRecepteurPharmaMl">Code recepteur PharmaMl</label>

          <input
            [pKeyFilter]="blockSpace"
            autocomplete="off"
            formControlName="codeRecepteurPharmaMl"
            id="field_codeRecepteurPharmaMl"
            name="codeRecepteurPharmaMl"
            pInputText
            class="w-full"
            type="text"
          />
        </div>
        <div class="form-field form-field-full">
          <label for="field_odre">Orde de priorité</label>

          <input
            autocomplete="off"
            formControlName="odre"
            id="field_odre"
            name="odre"
            pInputText
            pKeyFilter="int"
            class="w-full"
            type="text"
          />
        </div>
        <div class="form-field form-field-full">
          <label for="field_tel">Téléphone</label>

          <input
            autocomplete="off"
            formControlName="tel"
            id="field_tel"
            name="tel"
            pInputText
            pKeyFilter="int"
            class="w-full"
            type="text"
          />
        </div>
        <div class="form-field form-field-full">
          <label for="field_addresspostale">Adresse postale</label>

          <input
            autocomplete="off"
            formControlName="addresspostale"
            id="field_addresspostale"
            name="addresspostale"
            pInputText
            class="w-full"
            type="text"
          />
        </div>
      </div>
    </p-card>
  </div>
  <div class="modal-footer">
    <p-button (click)="cancel()" [raised]="true" icon="pi pi-times" label="Annuler" severity="secondary" type="button"/>
    <p-button
      (click)="save()"
      [disabled]="editForm.invalid || isSaving"
      [raised]="true"
      class="mr-2"
      icon="pi pi-check"
      label="Enregistrer"
      severity="primary"
      type="submit"
    ></p-button>
  </div>
</form>
<jhi-toast-alert #alert></jhi-toast-alert>
