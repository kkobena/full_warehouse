
<div class="row">
  <div class="col-lg-2 col-xl-2 col-xxl-2 col-md-3 col-sm-4">
    <div class="pharma-nav-sidebar">
      <div class="pharma-nav-sidebar-card">
        <div class="pharma-nav-sidebar-header">
          <i class="pi pi-shield"></i>
          <span>Rôles &amp; Autorisations</span>
        </div>
        <div class="pharma-nav-sidebar-content">
          <div
            #nav="ngbNav"
            [(activeId)]="active"
            class="nav flex-column nav-pills"
            ngbNav
            orientation="vertical"
          >
            <ng-container ngbNavItem="roles">
              <a class="pharma-nav-vertical-link" ngbNavLink>
                <i class="pi pi-users"></i>
                <span>Rôles</span>
                <span class="link-arrow">›</span>
              </a>
              <ng-template ngbNavContent>
                <app-role (managePermissions)="openPermissions($event)" />
              </ng-template>
            </ng-container>

            <ng-container ngbNavItem="autorisations" [destroyOnHide]="false">
              <a class="pharma-nav-vertical-link" ngbNavLink>
                <i class="pi pi-lock"></i>
                <span>Autorisations</span>
                <span class="link-arrow">›</span>
              </a>
              <ng-template ngbNavContent>
                <app-nav-manager [triggerRole]="pendingRole()" />
              </ng-template>
            </ng-container>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-xl-10 col-lg-10 col-md-9 col-sm-8">
    <div [ngbNavOutlet]="nav"></div>
  </div>
</div>
