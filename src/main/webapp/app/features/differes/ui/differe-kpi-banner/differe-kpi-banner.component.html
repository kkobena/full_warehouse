@if (summary()) {
  <div class="kpi-strip mt-1">

    <div class="kpi-strip-item primary-accent">
      <i class="pi pi-credit-card text-primary"></i>
      <div class="kpi-strip-body">
        <span class="kpi-strip-label">Total différé</span>
        <span class="kpi-strip-value text-primary">{{ summary().saleAmount | number }} FCFA</span>
      </div>
    </div>

    <div class="kpi-strip-divider"></div>

    <div class="kpi-strip-item success-accent">
      <i class="pi pi-check-circle text-success"></i>
      <div class="kpi-strip-body">
        <span class="kpi-strip-label">Total payé</span>
        <span class="kpi-strip-value text-success">{{ summary().paidAmount | number }} FCFA</span>
      </div>
    </div>

    <div class="kpi-strip-divider"></div>

    <div class="kpi-strip-item danger-accent">
      <i class="pi pi-exclamation-circle text-danger"></i>
      <div class="kpi-strip-body">
        <span class="kpi-strip-label">Reste à payer</span>
        <span class="kpi-strip-value text-danger">{{ summary().rest | number }} FCFA</span>
      </div>
    </div>

  </div>
}
