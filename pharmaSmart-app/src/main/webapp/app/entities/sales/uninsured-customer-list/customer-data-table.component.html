<app-data-table
  [paginator]="true"
  [rowsPerPageOptions]="[5, 8, 10, 20]"
  [rows]="10"
  [value]="customers"
  class="p-datatable-sm"
  dataKey="id"
>
  <ng-template #caption>
    <div class="row">
      <div class="col-md-8">
        <app-icon-field icon="pi pi-search">
          <input
            #searchInput
            (input)="loadCustomers()"
            [(ngModel)]="searchString"
            class="form-control"
            placeholder="Rechercher"
            style="width: 350px"
            type="text"
          />
        </app-icon-field>
      </div>
      <div class="col-md-4">
        <app-button (clicked)="addUninsuredCustomer()" icon="pi pi-user" label="Nouveau client" severity="help" size="small" />
      </div>
    </div>
  </ng-template>
  <ng-template #header>
    <tr class="pharma-table-head">
      <th style="width: 5%">#</th>
      <th style="width: 100px">CODE</th>
      <th>NOM</th>
      <th>PRENOM(S)</th>
      <th>TELEPHONE</th>
      <th style="width: 100px"></th>
    </tr>
  </ng-template>
  <ng-template #body let-customer let-rowIndex="rowIndex">
    <tr (click)="onSelect(customer)" style="cursor: pointer">
      <td style="text-align: left">
        <span class="pharma-code"> {{ rowIndex + 1 }}</span>
      </td>
      <td>{{ customer.code }}</td>
      <td>{{ customer.firstName }}</td>
      <td>{{ customer.lastName }}</td>
      <td>{{ customer.phone }}</td>
      <td style="text-align: right">
        <app-button
          (clicked)="onSelect(customer)"
          [rounded]="true"
          class="p-mb-3"
          icon="pi pi-check"
          ngbTooltip="Séléctionner"
          severity="info"
          size="small"
        />
      </td>
    </tr>
  </ng-template>
</app-data-table>
