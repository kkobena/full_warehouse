@if (account() !== null) {

  @if (loading()) {
    <!-- Skeleton pendant la résolution du layout -->
    <div class="d-flex justify-content-center align-items-center" style="height: 60vh">
      <p-skeleton width="100%" height="160px" />
    </div>
  } @else if (!isRoute()) {
    <!--
      Switch sur componentKey (et non sur le rôle).
      Un nouveau rôle assigné componentKey='PHARMACIEN' bénéficie automatiquement
      de jhi-home-base sans aucune modification de code.
    -->
    @switch (resolvedLayout()?.componentKey) {

      @case ('PHARMACIEN') {
        <div class="container-fluid"><app-home-base></app-home-base></div>
      }

      @case ('CAISSIER') {
        <app-caissier-dashboard></app-caissier-dashboard>
      }

      @case ('COMMANDE') {
        <app-commande-home></app-commande-home>
      }

      @default {
        <!--
          DEFAULT ou componentKey inconnu :
          - layoutConfig présent → GridStack personnalisé (TODO Phase 4)
          - sinon → DefaultDashboard
        -->
        @if (resolvedLayout()?.layoutConfig) {
          <!-- TODO : <app-customizable-dashboard [layout]="resolvedLayout()"> -->
          <div class="container-fluid"><app-home-base></app-home-base></div>
        } @else {
          <app-default-dashboard></app-default-dashboard>
        }
      }
    }
  }
  <!-- isRoute()=true : redirection gérée dans ngOnInit, rien à rendre ici -->

}
