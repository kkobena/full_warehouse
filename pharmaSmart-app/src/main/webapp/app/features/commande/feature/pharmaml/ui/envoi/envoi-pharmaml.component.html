<div class="modal-header">
  <h5 class="modal-title">Envoi commande PharmaML</h5>
  <button (click)="dismiss()" class="btn-close" type="button"></button>
</div>

<div class="modal-body">
  <app-card [variant]="'form'">
    <div class="form-grid-compact">
      <div class="form-field form-field-full">
        <label class="form-label">Type de commande</label>
        <app-select
          (ngModelChange)="typeCommande.set($event)"
          [ngModel]="typeCommande()"
          class="w-100"
          [items]="typeCommandeOptions"
          bindLabel="label"
          bindValue="value"
          [clearable]="false"
        />
      </div>

      <div class="form-field form-field-full">
        <pharma-date-picker
          (ngModelChange)="dateLivraison.set($event)"
          [minDate]="minDate"
          [ngModel]="dateLivraison()"
          id="dateLivraison"
          label="Date de livraison souhaitée"
        />
      </div>

      <div class="form-field form-field-full">
        <label class="form-label">Commentaire</label>
        <textarea
          (ngModelChange)="commentaire.set($event)"
          [ngModel]="commentaire()"
          class="form-control w-100"
          rows="3"
        ></textarea>
      </div>
    </div>
  </app-card>

</div>

<div class="modal-footer">
  <app-button
    (clicked)="dismiss()"
    label="Annuler"
    severity="secondary"
  />
  <app-button
    (clicked)="envoi()"
    [loading]="loading()"
    icon="pi pi-send"
    label="Envoyer"
  />
</div>
