<div class="container-fluid">
  <div class="pharma-nav-tabs-container">
    <div
      #nav="ngbNav"
      [(activeId)]="activeTab"
      (navChange)="onTabChange($event)"
      class="nav pharma-nav-tabs"
      ngbNav
      orientation="horizontal"
    >
      <ng-container ngbNavItem="historique">
        <a class="pharma-nav-tab-link" ngbNavLink>
          <i class="pi pi-history"></i>
          <span>Traçabilité</span>
        </a>
        <ng-template ngbNavContent>
          <jhi-repartition-list [fromDate]="dtStart()" [searchTerm]="search()" [toDate]="dtEnd()"></jhi-repartition-list>
        </ng-template>
      </ng-container>

      <ng-container ngbNavItem="rayon">
        <a class="pharma-nav-tab-link" ngbNavLink>
          <i class="pi pi-shopping-cart"></i>
          <span>Réassort suggéré – Rayon</span>
        </a>
        <ng-template ngbNavContent>
          <jhi-suggestion-reassort #suggestionRayon [typeReassort]="'RAYON'"></jhi-suggestion-reassort>
        </ng-template>
      </ng-container>

      <ng-container ngbNavItem="reserve">
        <a class="pharma-nav-tab-link" ngbNavLink>
          <i class="pi pi-warehouse"></i>
          <span>Réassort suggéré – Réserve</span>
        </a>
        <ng-template ngbNavContent>
          <jhi-suggestion-reassort #suggestionReserve [typeReassort]="'RESERVE'"></jhi-suggestion-reassort>
        </ng-template>
      </ng-container>

      <ng-container ngbNavItem="manual">
        <a class="pharma-nav-tab-link" ngbNavLink>
          <i class="pi pi-cog"></i>
          <span>Transfert manuel Rayon / Réserve</span>
        </a>
        <ng-template ngbNavContent>
          <jhi-manual-repartition></jhi-manual-repartition>
        </ng-template>
      </ng-container>
    </div>
    <div class="pharma-nav-tabs-outlet">
      <div [ngbNavOutlet]="nav"></div>
    </div>
  </div>
</div>
