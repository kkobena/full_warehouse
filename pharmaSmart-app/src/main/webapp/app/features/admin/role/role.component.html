
<div class="pharma-smart-content p-1">

  <!-- Toolbar -->
  <app-toolbar icon="pi pi-shield" title="Rôles" [compact]="true">
    <ng-container ngProjectAs="[toolbarActions]">
      <div class="pharma-toolbar-actions">
        <app-button
          label="Nouveau rôle"
          icon="pi pi-plus"
          severity="success"
          size="small"
          (clicked)="openCreateForm()"
        />
      </div>
    </ng-container>
  </app-toolbar>

  <!-- Table des rôles -->
  <app-data-table
    [value]="roles()"
    [loading]="loading()"
    class="p-datatable-sm"
  >
    <ng-template #header>
      <tr class="pharma-table-head">
        <th>Libellé</th>
        <th style="width:160px"></th>
      </tr>
    </ng-template>

    <ng-template #body let-role>
      <tr [class.row-predefined]="isPredefined(role.name)">
        <!-- Libellé (éditable) -->
        <td>
          @if (editingName() === role.name) {
            <div class="d-flex align-items-center gap-2">
              <input class="form-control"
                [value]="editingLibelle"
                (input)="editingLibelle = $any($event.target).value"
                (keydown.enter)="saveEdit(role)"
                (keydown.escape)="cancelEdit()"
                (blur)="saveEdit(role)"
                autofocus
              />
            </div>
          } @else {
            <div class="libelle-display">
              <span>{{ role.libelle ?? role.name }}</span>
              <button class="edit-btn" type="button" (click)="startEdit(role)" title="Modifier le libellé">
                <i class="pi pi-pencil"></i>
              </button>
            </div>
          }
        </td>

        <!-- Actions -->
        <td class="text-end">
          <div class="d-flex align-items-center justify-content-end gap-1">
            <app-button
              icon="pi pi-lock"
              severity="help"
              size="small"
              [text]="true"
              [rounded]="true"
              ngbTooltip="Gérer les autorisations"
              (clicked)="managePermissions.emit(role.name!)"
            />
            @if (!isPredefined(role.name)) {
              <app-button
                icon="pi pi-trash"
                severity="danger"
                size="small"
                [text]="true"
                [rounded]="true"
                ngbTooltip="Supprimer ce rôle"
                (clicked)="deleteRole(role)"
              />
            }
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="3" class="text-center text-muted py-4">
          Aucun rôle trouvé.
        </td>
      </tr>
    </ng-template>
  </app-data-table>
</div>
