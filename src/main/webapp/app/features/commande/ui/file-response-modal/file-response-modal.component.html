<div class="modal-header">
  <h5 class="modal-title">{{ header }}</h5>
  <button (click)="cancel()" aria-label="Close" class="btn-close" type="button"></button>
</div>
<div class="modal-body">
  <p-card>
    <div class="form-group">
      <p-fileupload
        (uploadHandler)="onImporterReponseCommande($event)"
        [customUpload]="true"
        accept=".csv,.xls,.xlsx"
        cancelLabel="Annuler"
        chooseLabel="Importer un fichier"
        name="importcsv"
        uploadLabel="Enrégistrer"
      >
      </p-fileupload>
    </div>
  </p-card>
</div>

<div class="modal-footer">
  <p-button (click)="cancel()"  icon="pi pi-times" label="Fermer" raised="true" severity="secondary" type="button"/>
</div>
<jhi-spinner #spinner></jhi-spinner>
