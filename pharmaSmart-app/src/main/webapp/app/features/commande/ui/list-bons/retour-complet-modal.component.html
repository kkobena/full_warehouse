<div class="modal-header">
  <h5 class="modal-title">
    <i class="pi pi-replay me-2"></i>
    Retour complet du bon
  </h5>
  <button type="button" class="btn-close" (click)="dismiss()"></button>
</div>

<div class="modal-body">
  <div class="rc-info-banner">
    <i class="pi pi-info-circle"></i>
    <span>
      Toutes les lignes reçues du bon
      <strong>{{ delivery?.receiptReference ?? delivery?.orderReference ?? '—' }}</strong>
      @if (delivery?.fournisseurLibelle) {
        &mdash; {{ delivery!.fournisseurLibelle }}
      }
      seront retournées.
    </span>
  </div>

  <div class="form-group">
    <label class="form-label">
      Motif de retour <span class="text-danger">*</span>
    </label>
    <app-select
      [(ngModel)]="selectedMotifId"
      [items]="motifs()"
      bindLabel="libelle"
      bindValue="id"
      placeholder="Sélectionner un motif"
      class="w-100"
    />
  </div>

  <div class="form-group">
    <label class="form-label">Commentaire</label>
    <input
      [(ngModel)]="commentaire"
      placeholder="Commentaire optionnel"
      class="form-control w-100"
    />
  </div>
</div>

<div class="modal-footer">
  <app-button
    label="Annuler"
    severity="secondary"
    size="small"
    icon="pi pi-times"
    (clicked)="dismiss()"
  />
  <app-button
    label="Créer le retour complet"
    icon="pi pi-replay"
    severity="danger"
    size="small"
    [disabled]="!selectedMotifId"
    (clicked)="confirm()"
  />
</div>
