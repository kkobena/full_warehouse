<div class="modal-header">
  <h4 class="modal-title">
    <i class="pi pi-check-circle me-2"></i>
    Valider {{ bed?.receiptReference ?? 'le BED' }}
  </h4>
  <button (click)="activeModal.dismiss()" class="btn-close" type="button"></button>
</div>

<form (ngSubmit)="onConfirm()" name="bedValidateForm" novalidate role="form">
  <div class="modal-body">
    <div class="rc-info-banner">
      <i class="pi pi-info-circle"></i>
      <span>
       Cette action créditera le stock et est <strong>irréversible</strong>.
    </span>
    </div>

    <app-card [variant]="'form'">
      <div class="form-grid-compact">

        <!-- Motif -->
        <div class="form-field form-field-full">
          <label>Motif <span class="required">*</span></label>
          <app-select
            (ngModelChange)="formMotif.set($event)"
            [ngModel]="formMotif()"
            name="motif"
            [items]="motifOptions"
            bindLabel="label"
            bindValue="value"
            placeholder="— Choisir un motif —"
            [clearable]="false"
          />
        </div>

        <!-- Fournisseur -->
        <div class="form-field form-field-full">
          <label>Fournisseur <small class="text-muted fw-normal">(optionnel)</small></label>
          <app-fournisseur-select
            (selectionChange)="onFournisseurSelected($event)"
            [appendTo]="null"
            placeholder="Rechercher un fournisseur…"
          />
        </div>

        <!-- Commentaire -->
        <div class="form-field form-field-full">
          <label>Commentaire <small class="text-muted fw-normal">(optionnel)</small></label>
          <textarea
            [(ngModel)]="commentaire"
            class="form-control"
            name="commentaire"
            placeholder="Observations, précisions…"
            rows="2"
          ></textarea>
        </div>

      </div>
    </app-card>
  </div>

  <div class="modal-footer">
    <app-button
      (clicked)="activeModal.dismiss()"
      icon="pi pi-times"
      label="Annuler"
      severity="secondary"
      type="button"
    />
    <app-button
      [disabled]="!formMotif()"
      icon="pi pi-check"
      label="Valider"
      severity="success"
      type="submit"
    />
  </div>
</form>
