<div class="modal-header">
  <h4 class="modal-title">{{ header }}</h4>
  <button (click)="cancel()" aria-hidden="true" class="btn-close" data-dismiss="modal" type="button">&times;</button>
</div>

<div class="modal-body">
  <app-card>
    <app-customer-data-table (closeModalEvent)="onSelectClose($event)"></app-customer-data-table>
  </app-card>
</div>

<div class="modal-footer">
  <app-button (clicked)="cancel()" severity="secondary" icon="pi pi-times" label="Fermer" [raised]="true" type="button" />
</div>
