<div class="modal-header">
  <h4 class="modal-title">Ajouter un détail au produit {{ produit?.libelle }}</h4>
  <button (click)="cancel()" aria-label="Close" class="btn-close" type="button"></button>
</div>


<form (ngSubmit)="save()" [formGroup]="editForm" name="editForm" novalidate role="form">
  <div class="modal-body">
    <p-card>
      @if (isNotValid) {
        <div class="alert alert-dismissible alert-danger">
          <strong>Stock insuffisant </strong>
        </div>
      }

      <div class="form-grid-compact">
        <label for="field_libelle">Nombre de cartons à déconditioner<span
          class="required">*</span></label>
        <input
          (keyup)="onQuantitySoldBoxChanged($event)"
          formControlName="qtyMvt"
          id="field_libelle"
          name="qtyMvt"
          pInputText
          type="number"
        />
        @if (editForm.get('qtyMvt')!.invalid && (editForm.get('qtyMvt')!.dirty || editForm.get('qtyMvt')!.touched)) {
          <div>
            @if (editForm.get('qtyMvt')?.errors?.required) {
              <small class="form-text text-danger" jhiTranslate="entity.validation.required"> This field is
                required. </small>
            }
          </div>
        }
      </div>
    </p-card>
  </div>

  <div class="modal-footer">
    <p-button
      (click)="cancel()"
      class="mr-2"
      icon="pi pi-times"
      label="Annuler"
      raised="true"
      severity="secondary"
      type="button"
    ></p-button>
    <p-button
      [disabled]="editForm.invalid || isSaving || isNotValid"
      icon="pi pi-check"
      label="Enregistrer"
      raised="true"
      severity="primary"
      type="submit"
    ></p-button>
  </div>

</form>
