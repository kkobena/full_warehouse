<div class="modal-header">
  <h4 class="modal-title">{{ title }}</h4>
  <button (click)="cancel()" aria-label="Close" class="btn-close" type="button"></button>
</div>
<div class="modal-body">
  <app-card [variant]="'form'">
    <div class="ui-g form-group">
      <label class="form-control-label" for="fournisseurId">Fournisseurs<span
        style="font-weight: 900; color: red">*</span></label>
      <app-select
        [(ngModel)]="selectedFournisseurId"
        [items]="fournisseurs"
        bindLabel="libelle"
        bindValue="id"
        inputId="fournisseurId"
        placeholder="Sélectionner un fournisseur"
      />
    </div>
    <div class="text-center ui-g form-group">
      <app-file-upload
        [accept]="accept"
        (filesSelected)="onFilesSelected($event)"
      />
    </div>
  </app-card>
</div>

<div class="modal-footer">
  <app-button
    (clicked)="cancel()"
    class="mr-2"
    icon="pi pi-times"
    label="Fermer"
    severity="secondary"
    type="button"
  />

  <app-button
    (clicked)="onUpload()"
    [disabled]="!isFileUploadValid || isSaving"
    icon="pi pi-upload"
    label="Enrégistrer"
    severity="primary"
    type="submit"
  />
</div>

<jhi-spinner #spinner></jhi-spinner>
