<form (ngSubmit)="save()" [formGroup]="reglementForm" class="reglement-form">

  <!-- Grille inline : tous les champs sur une ligne -->
  <div class="form-grid">

    @if (showPartialToggle()) {
      <div class="toggle-field">
        <app-switch formControlName="partialPayment" inputId="partialPayment" />
        <label for="partialPayment">Tout régler</label>
      </div>
    }
    <app-input-number
      [inputClass]="'amount-input'"
      [readonly]="isReadOnly"
      formControlName="amount"
      placeholder="Montant"
    />


    <app-select [items]="paymentModes"
                appendTo="body"
                bindLabel="libelle"
                bindValue="code"
                formControlName="modePaimentCode"
                placeholder="Mode de paiement"
                size="small"
    />
    <pharma-date-picker [labelPosition]="'top'" [maxDate]="maxDate" formControlName="paymentDate"
                        id="datePaiement" label="Date paiement" />


    <app-button
      [disabled]="!valid || !validMontantSaisi() || isSaving()"
      [loading]="isSaving()"
      icon="pi pi-check"
      label="Valider"
      severity="success"
      size="small"
      type="submit"
    />

  </div>

  <!-- Infos bancaires (si chèque / virement) -->
  @if (showBanqueInfo) {
    <div class="bank-fields" formGroupName="banqueInfo">
      <input class="form-control" formControlName="nom" placeholder="Nom de la banque" />
      @if (reglementForm.get('modePaimentCode')!.value === CH) {
        <input [appKeyFilter]="'alphanum'" class="form-control" formControlName="code"
               placeholder="N° chèque" />
      }
      <input class="form-control" formControlName="beneficiaire" placeholder="Bénéficiaire" />
    </div>
  }

</form>
