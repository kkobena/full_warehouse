<div class="container-fluid">
  <div class="row">
    <div class="col-lg-2 col-xl-2 col-md-2 col-sm-4">
      <div class="pharma-nav-sidebar">
        <div class="pharma-nav-sidebar-card">
          <div class="pharma-nav-sidebar-header">
            <i class="pi pi-box"></i>
            <span>Stock &amp; Inventaire</span>
          </div>

          <div class="pharma-nav-sidebar-content">
            <div #nav="ngbNav" [(activeId)]="active" class="nav flex-column nav-pills" ngbNav orientation="vertical">

              @if (showStockAlerts()) {
                <ng-container ngbNavItem="stock-alerts">
                  <a class="pharma-nav-vertical-link" ngbNavLink>
                    <i class="pi pi-exclamation-triangle"></i>
                    <span>Alertes de Stock</span>
                    <span class="link-arrow">›</span>
                  </a>
                  <ng-template ngbNavContent>
                    <jhi-stock-alerts></jhi-stock-alerts>
                  </ng-template>
                </ng-container>
              }

              @if (showStockValuation()) {
                <ng-container ngbNavItem="stock-valuation">
                  <a class="pharma-nav-vertical-link" ngbNavLink>
                    <i class="pi pi-dollar"></i>
                    <span>Valorisation du Stock</span>
                    <span class="link-arrow">›</span>
                  </a>
                  <ng-template ngbNavContent>
                    <jhi-stock-valuation></jhi-stock-valuation>
                  </ng-template>
                </ng-container>
              }

              @if (showRecapProduit()) {
                <ng-container ngbNavItem="recap-produit-vendu">
                  <a class="pharma-nav-vertical-link" ngbNavLink>
                    <i class="pi pi-chart-bar"></i>
                    <span>Récap Produits Vendus/Invendus</span>
                    <span class="link-arrow">›</span>
                  </a>
                  <ng-template ngbNavContent>
                    <jhi-recap-produit-vendu></jhi-recap-produit-vendu>
                  </ng-template>
                </ng-container>
              }

              @if (showStockRotation()) {
                <ng-container ngbNavItem="stock-rotation">
                  <a class="pharma-nav-vertical-link" ngbNavLink>
                    <i class="pi pi-sync"></i>
                    <span>Rotation du Stock</span>
                    <span class="link-arrow">›</span>
                  </a>
                  <ng-template ngbNavContent>
                    <jhi-stock-rotation></jhi-stock-rotation>
                  </ng-template>
                </ng-container>
              }

              @if (showAbcPareto()) {
                <ng-container ngbNavItem="abc-pareto">
                  <a class="pharma-nav-vertical-link" ngbNavLink>
                    <i class="pi pi-sort-amount-down"></i>
                    <span>Analyse ABC Pareto</span>
                    <span class="link-arrow">›</span>
                  </a>
                  <ng-template ngbNavContent>
                    <jhi-abc-pareto></jhi-abc-pareto>
                  </ng-template>
                </ng-container>
              }

            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-10 col-xl-10 col-md-10 col-sm-8 pharma-smart-content">
      <div [ngbNavOutlet]="nav"></div>
    </div>
  </div>
</div>
