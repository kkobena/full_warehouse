<!-- Content spécifique DEVIS -->
<!-- 1ère ligne: Barre recherche client (style harmonisé avec insurance-data-bar) -->
<div class="devis-customer-section">
  <div class="customer-search-wrapper">
    <!-- Search Section -->
    <div class="search-section">
      <app-icon-field icon="pi pi-search" [overlay]="true" class="search-input-wrapper">
        <input #searchInput
               (keydown.enter)="onSearchCustomer()"
               [(ngModel)]="search"
               autocomplete="off"
               class="form-control search-input"
               placeholder="Rechercher un client..."
               type="text" />
      </app-icon-field>
      <app-button
        (clicked)="onOpenCustomerList()"
        [rounded]="true"
        icon="pi pi-list"
        ngbTooltip="Liste des clients"
        severity="secondary"
        size="small" />
      <app-button
        (clicked)="onAddCustomer()"
        [rounded]="true"
        icon="pi pi-user-plus"
        ngbTooltip="Nouveau client"
        severity="success"
        size="small" />
    </div>

    <!-- Customer Display - Style compact inline (comme customer-overlay-panel) -->
    @if (selectedCustomer()) {
      <div class="customer-data-display">
        <div class="customer-display-card">
          <!-- Action Buttons -->
          <div class="customer-action-btn">
            <app-button
              (clicked)="onOpenCustomerList()"
              [rounded]="true"
              [text]="true"
              icon="pi pi-times"
              ngbTooltip="Changer le client"
              severity="danger"
              size="small"
              placement="top" />
            <app-button
              (clicked)="onEditCustomer()"
              [rounded]="true"
              [text]="true"
              icon="pi pi-user-edit"
              ngbTooltip="Modifier le client"
              severity="info"
              size="small"
              placement="top" />
          </div>

          <!-- Customer Information Display -->
          <div class="customer-info-display">
            <div class="customer-info-row">
              <div class="info-item name-info">
                <i class="pi pi-user"></i>
                <span
                  class="info-value">{{ selectedCustomer().firstName }} {{ selectedCustomer().lastName }}</span>
              </div>

              @if (selectedCustomer().phone) {
                <div class="info-item phone-info">
                  <i class="pi pi-phone"></i>
                  <span class="info-value">{{ selectedCustomer().phone }}</span>
                </div>
              }
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>

<!-- 2ème ligne: Recherche produit (ligne entière) -->
<app-product-search-section
  #produitbox
  (addQuantite)="onAddQuantity($event)"
  (onKeyEnter)="onProductSearchEnter($event)"
  (productScanned)="onProductScanned($event)"
  (productSelected)="onProductSelected($event)"
  [autofocus]="false"
  [hasCustomer]="hasCustomer()"
  [requiresCustomer]="true"
  [saleType]="'COMPTANT'"
  [selectedProduct]="selectedProduct()"
  [showStock]="showStock()">
</app-product-search-section>

<!-- 3ème ligne: Tableau produit (gauche) + Sale summary (droite) -->
@if (currentSale()) {
  <div class="row">
    <div class="col-lg-9 col-sm-12 col-md-12 col-xl-9 col-xxl-9">
      <app-product-list
        (authorizationRequired)="onAuthorizationRequired($event)"
        (lineRemoved)="onLineRemoved($event)"
        (lineSelected)="onLineSelected($event)"
        (quantityChanged)="onLineQuantityChanged($event)"
        (quantityRequestedChanged)="onLineQuantityRequestedChanged($event)"
        (remiseActionCancelled)="focusProductSearch()"
        (remiseSelected)="onRemiseSelected($event)"
        (removeRemise)="onRemoveRemise()"
        [currentRemise]="currentSale()?.remise"
        [isEditable]="!isSaving()"
        [remises]="remises()"
        [saleId]="currentSale()?.id"
        [saleType]="'COMPTANT'"
        [salesLines]="salesLines()"
        [selectedLineId]="selectedLineId()"
        [showRemiseSection]="true" />
    </div>

    <div class="amounts-summary col-lg-3 col-sm-12 col-md-12 col-xl-3 col-xxl-3">
      <div class="grid">
        <div class="col-12">
          <app-sale-summary
            [amountToBePaid]="currentSale()?.amountToBePaid || 0"
            [currentRemise]="currentSale()?.remise"
            [discountAmount]="currentSale()?.discountAmount || 0"
            [isAvoir]="isAvoir()"
            [itemCount]="salesLines().length"
            [netAmount]="currentSale()?.netAmount || 0"
            [saleType]="'COMPTANT'"
            [taxAmount]="currentSale()?.taxAmount || 0"
            [totalAmount]="currentSale()?.salesAmount || 0" />
        </div>
        <div class="col-12 d-flex justify-content-center">
          <app-sale-actions
            (cancel)="onCancel()"
            (putOnHold)="onPutOnHold()"
            (save)="onSaveAsDevis()"
            (saveAsPresale)="onSaveAsDevis()"
            [canCancel]="true"
            [canSaveAsPresale]="canSave()"
            [canSave]="canSave()"
            [isDevis]="true"
            [isPresale]="false"
            [isSaving]="isSaving()"
            [isSmallScreen]="isSmallScreen()"
            [saleType]="'COMPTANT'" />
        </div>
      </div>
    </div>
  </div>

  <!-- Pas de section paiement pour les devis -->
} @else {
  <div class="empty-cart-state">
    <div class="empty-cart-icon">
      <i class="pi pi-file-edit"></i>
    </div>
    <h3>Panier vide</h3>
    <p>Sélectionnez un client et ajoutez des produits pour créer une proforma</p>
  </div>
}

<!-- Spinner global -->
<ngx-spinner [fullScreen]="true" bdColor="rgba(255,255,255,0.5)"
             color="#009688" name="sale-spinner"
             size="medium" type="timer"></ngx-spinner>
