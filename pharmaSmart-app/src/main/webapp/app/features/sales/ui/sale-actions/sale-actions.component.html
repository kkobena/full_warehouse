<div class="sale-actions-container">
  <!-- Version Mobile : Icon-only avec tooltips -->
  @if (isSmallScreen()) {
    <div class="btn-group" role="group">
      @if (!isPresale() && !isDevis()) {
        <app-button
          (clicked)="onSave()"
          [disabled]="!canSave() || isSaving()"
          [icon]="getSaveButtonIcon()"
          [loading]="isSaving()"
          [ngbTooltip]="getSaveButtonLabel()"
          [raised]="true"
          [severity]="getSaveButtonSeverity()"
          size="large" />

        <app-button
          (clicked)="onPutOnHold()"
          [disabled]="isSaving()"
          [raised]="true"
          icon="pi pi-pause"
          ngbTooltip="Mettre en attente"
          severity="secondary"
          size="large" />
        <app-button
          (clicked)="onCancel()"
          [disabled]="!canCancel() || isSaving()"
          [raised]="true"
          icon="pi pi-times"
          ngbTooltip="Annuler"
          severity="danger"
          size="large" />
      } @else {

        <app-button
          (clicked)="onSaveAsPresale()"
          [disabled]=" isSaving()"
          [icon]="getSaveButtonIcon()"
          [loading]="isSaving()"
          [ngbTooltip]="getSaveButtonLabel()"
          [raised]="true"
          [severity]="getSaveButtonSeverity()"
          size="large" />
        @if (isPresale()) {
          <app-button
            (clicked)="onSavePresale()"
            [disabled]=" isSaving()"
            [icon]="getSavePresaleIcon()"
            [loading]="isSaving()"
            [ngbTooltip]="getSavePresaleButtonLabel()"
            [raised]="true"
            [severity]="getSavePresaleSeverity()"
            size="large" />
        } @else {
          <app-button
            (clicked)="onCancel()"
            [disabled]="!canCancel() || isSaving()"
            [raised]="true"
            icon="pi pi-times"
            ngbTooltip="Annuler"
            severity="danger"
            size="large" />
        }
      }

    </div>
  } @else {
    <!-- Version Desktop : Boutons avec labels dans ButtonGroup -->
    <div>
      <div class="btn-group" role="group">
        @if (!isPresale() && !isDevis()) {
          <app-button
            (clicked)="onSave()"
            [disabled]="!canSave() || isSaving()"
            [icon]="getSaveButtonIcon()"
            [label]="getSaveButtonLabel()"
            [loading]="isSaving()"
            [raised]="true"
            [severity]="getSaveButtonSeverity()" />

          @if (showButtonEnAttente()) {
            <app-button
              (clicked)="onPutOnHold()"
              [disabled]="isSaving()"
              [raised]="true"
              icon="pi pi-pause"
              label="En attente"
              severity="secondary" />
          }

          <app-button
            (clicked)="onCancel()"
            [disabled]="!canCancel() || isSaving()"
            [raised]="true"
            icon="pi pi-times"
            label="Annuler"
            severity="danger" />
        } @else {
          <app-button
            (clicked)="onSaveAsPresale()"
            [disabled]="isSaving()"
            [icon]="getSaveButtonIcon()"
            [label]="getSaveButtonLabel()"
            [loading]="isSaving()"
            [raised]="true"
            [severity]="getSaveButtonSeverity()" />

          @if (isPresale()) {
            <app-button
              (clicked)="onSavePresale()"
              [disabled]=" isSaving()"
              [icon]="getSavePresaleIcon()"
              [label]="getSavePresaleButtonLabel()"
              [loading]="isSaving()"
              [raised]="true"
              [severity]="getSavePresaleSeverity()" />
          } @else {
            <app-button
              (clicked)="onCancel()"
              [disabled]="!canCancel() || isSaving()"
              [raised]="true"
              icon="pi pi-times"
              label="Annuler"
              severity="danger" />
          }
        }


      </div>


    </div>

    @if (showPrintButton() && canPrint()) {
      <div class="btn-group" role="group">
        <app-button
          (clicked)="onPrint()"
          [disabled]="!canPrint()"
          icon="pi pi-print"
          label="Imprimer"
          severity="secondary" />
      </div>

    }


  }
</div>
