<div class="modal-header">
  <h5 class="modal-title">
    <i class="pi pi-plus me-2"></i>
    Ajouter un Widget
  </h5>
  <button type="button" class="btn-close" aria-label="Close" (click)="dismiss()"></button>
</div>

<div class="modal-body">
  <div class="widget-grid">
    @for (widget of availableWidgets; track widget.value) {
      <div
        class="widget-option-card"
        [class.selected]="selectedWidgetType === widget.value"
        (click)="selectWidget(widget.value)">
        <div class="widget-option-icon">
          <i class="pi" [ngClass]="widget.icon"></i>
        </div>
        <div class="widget-option-content">
          <div class="widget-option-title">{{ widget.label }}</div>
          <div class="widget-option-description">{{ widget.description }}</div>
        </div>
        @if (selectedWidgetType === widget.value) {
          <div class="widget-option-check">
            <i class="pi pi-check-circle"></i>
          </div>
        }
      </div>
    }
  </div>
</div>

<div class="modal-footer">
  <p-button
    label="Annuler"
    icon="pi pi-times"
    (onClick)="dismiss()"
    severity="secondary"
    [text]="true"
  />
  <p-button
    label="Ajouter"
    icon="pi pi-check"
    (onClick)="addWidget()"
    [disabled]="!selectedWidgetType"
  />
</div>
