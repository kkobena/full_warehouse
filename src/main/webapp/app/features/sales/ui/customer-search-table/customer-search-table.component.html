<p-table
  [value]="customers()"
  [paginator]="true"
  [rows]="10"
  [rowsPerPageOptions]="[5, 8, 10, 20]"
  [showCurrentPageReport]="true"
  [loading]="loading()"
  class="pharma-table"
  currentPageReportTemplate="Affichage de {first} à {last} sur {totalRecords} clients"
  dataKey="id"
  selectionMode="single"
>
  <ng-template #caption>
    <div class="row">
      <div class="col-md-8">
        <p-iconfield>
          <p-inputicon class="pi pi-search" />
          <input
            #searchInput
            type="text"
            pInputText
            [(ngModel)]="searchTerm"
            (input)="onSearchChange(searchTerm)"
            placeholder="Rechercher un client (nom, prénom)..."
            style="width: 350px"
          />
        </p-iconfield>
      </div>
      <div class="col-md-4">
        <p-button (click)="addNewCustomer()" icon="pi pi-user" label="Nouveau client" severity="help" size="small"></p-button>
      </div>
    </div>
  </ng-template>

  <ng-template #header>
    <tr class="pharma-table-head">
      <th style="width: 5%">#</th>
      <th style="width: 100px">CODE</th>
      <th>NOM</th>
      <th>PRENOM(S)</th>
      <th>TELEPHONE</th>
      <th style="width: 100px"></th>
    </tr>
  </ng-template>

  <ng-template #body let-customer let-rowIndex="rowIndex">
    <tr (click)="selectCustomer(customer)" style="cursor: pointer">
      <td style="text-align: left">
        <span class="pharma-code">{{ rowIndex + 1 }}</span>
      </td>
      <td>{{ customer.code }}</td>
      <td>{{ customer.firstName }}</td>
      <td>{{ customer.lastName }}</td>
      <td>{{ customer.phone }}</td>
      <td style="text-align: right">
        <p-button
          (click)="selectCustomer(customer); $event.stopPropagation()"
          [rounded]="true"
          icon="pi pi-check-circle"
          pTooltip="Sélectionner ce client"
          severity="success"
          size="small"
          [text]="true"
        ></p-button>
      </td>
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td colspan="6" class="text-center">
        {{ searchTerm ? 'Aucun client trouvé' : 'Saisissez un terme de recherche pour trouver un client' }}
      </td>
    </tr>
  </ng-template>
</p-table>
