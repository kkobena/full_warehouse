<div class="modal-header">
  <h4 class="modal-title">{{ header }}</h4>
  <button (click)="cancel()" aria-label="Close" class="btn-close" type="button"></button>
</div>
<div class="modal-body">
  <p-card>
    <div class="form-grid-compact">
      <div class="form-field form-field-full">
        <label>Fournisseurs<span class="required">*</span></label>
        <p-select
          [(ngModel)]="fournisseurSelectedId"
          [filter]="true"
          [fluid]="true"
          [options]="fournisseurs"
          optionLabel="libelle"
          optionValue="id"
          placeholder="Séléctionner un fournisseur "
          size="large"
        >
        </p-select>
      </div>
      <div class="form-field form-field-full">
        <label>Model de fichier<span class="required">*</span></label>
        <p-select
          [(ngModel)]="modelSelected"
          [filter]="false"
          (onShow)="onDropdownShow($event)"
          (onHide)="onDropdownHide($event)"
          [options]="models"
          optionLabel="label"
          optionValue="value"
          placeholder="Séléctionner un model de fichier "
        >
        </p-select>
      </div>
      <div class="form-field form-field-full">
        <label>Charger un fichier<span class="required">*</span></label>
        <p-fileupload
          #fileUpload
          (uploadHandler)="uploadHandler($event, fileUpload)"
          [auto]="true"
          [customUpload]="true"
          [showCancelButton]="true"
          accept=".csv,.txt"
          chooseLabel="Importer un fichier"
          mode="basic"
        >
        </p-fileupload>
      </div>
    </div>
  </p-card>
</div>

<div class="modal-footer">
  <p-button
    (click)="cancel()"
    class="mr-2"
    data-dismiss="modal"
    icon="pi pi-times"
    label="Annuler"
    raised="true"
    severity="secondary"
    type="button"
  >
  </p-button>

  <p-button
    (click)="save()"
    [disabled]="isSaving || !isValidForm()"
    icon="pi pi-check"
    id="save-entity"
    label="Enregister"
    raised="true"
    severity="primary"
  >
  </p-button>
</div>
<jhi-toast-alert #alert></jhi-toast-alert>
<jhi-spinner #spinner></jhi-spinner>
