<p-floatlabel variant="on">
  <p-autoComplete
    #produitbox
    [(ngModel)]="produitSelected"
    (ngModelChange)="onNgModelChange($event)"
    [suggestions]="produits()"
    (completeMethod)="searchFn($event)"
    (onSelect)="onSelect()"
    (keydown)="onKeyDown($event)"
    [minQueryLength]="PRODUIT_COMBO_MIN_LENGTH"
    optionLabel="libelle"
    [appendTo]="APPEND_TO"
    [autoHighlight]="true"
    [autoOptionFocus]="true"
    [autofocus]="autofocus()"
    [showClear]="showClear()"
    [style]="style()"
    [inputStyle]="inputStyle()"
    [disabled]="disabled()"
    dataKey="id"
    placeholder=" ">
    <ng-template #item let-item>
      <div class="product-item-row">
        <span [class.stockless]="item.totalQuantity <= 0" class="product-cip">
          {{ item.fournisseurProduit?.codeCip }}
        </span>
        <span [class.stockless]="item.totalQuantity <= 0" class="product-name">
          {{ item.libelle }}
        </span>
        <span class="product-item-right">
        <span
            class="stock-badge"
            [class.stock-ok]="item.totalQuantity > 0 && item.totalQuantity > 5"
            [class.stock-low]="item.totalQuantity > 0 && item.totalQuantity <= 5"
            [class.stock-out]="item.totalQuantity <= 0"
            [title]="item.totalQuantity <= 0 ? 'Rupture de stock' : 'Stock disponible : ' + item.totalQuantity">
            <i class="pi"
               [class.pi-check-circle]="item.totalQuantity > 5"
               [class.pi-exclamation-circle]="item.totalQuantity > 0 && item.totalQuantity <= 5"
               [class.pi-times-circle]="item.totalQuantity <= 0"></i>
            {{ item.totalQuantity | number }}
          </span>
          @if ((item.reserveQuantity || 0) > 0) {
            <span class="reserve-badge" [title]="'Réserve : ' + item.reserveQuantity">
              <i class="pi pi-box" style="font-size: 0.7rem"></i> {{ item.reserveQuantity | number }}
            </span>
          }
          <span [class.stockless]="item.totalQuantity <= 0" class="product-price">
            {{ item.fournisseurProduit?.prixUni | number }}
          </span>
        </span>
      </div>
    </ng-template>
  </p-autoComplete>
  <label>{{ 'warehouseApp.labels.produits' | translate }}</label>
</p-floatlabel>
