<app-float-label label="{{ 'warehouseApp.labels.produits' | translate }}" inputId="produits">
  <app-select-search
    #produitbox
    [(ngModel)]="produitSelected"
    (ngModelChange)="onNgModelChange($event)"
    [items]="produits()"
    [typeahead]="typeaheadSink$"
    (searched)="searchFn($event)"
    (selectionChange)="onSelect()"
    (keydown)="onKeyDown($event)"
    [minSearchLength]="PRODUIT_COMBO_MIN_LENGTH"
    [notFoundText]="PRODUIT_NOT_FOUND"
    bindLabel="libelle"
    [appendTo]="APPEND_TO"
    [clearable]="showClear()"
    inputId="produits"
    placeholder=" "
    [style]="style()"
    [optionTemplate]="produitItem"
  />
  <ng-template #produitItem let-item>
    <div style="width: 100%">
      <span [class.stockless]="item.totalQuantity <= 0" style="width: 20%; display: inline-block">
        {{ item.fournisseurProduit?.codeCip }}
      </span>
      <span [class.stockless]="item.totalQuantity <= 0">
        {{ item.libelle }}
      </span>
      <span [class.stockless]="item.totalQuantity <= 0" class="float-right">
        {{ item.regularUnitPrice | number }}
      </span>
    </div>
  </ng-template>
</app-float-label>
