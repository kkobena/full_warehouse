<div class="pharma-smart-content p-1">
  <!-- Toolbar -->
  <app-toolbar [compact]="true" icon="pi pi-credit-card" title="Ventes à crédit (différés)">
    <ng-container ngProjectAs="[toolbarFilters]">

      <label for="dhClient">Client</label>
      <app-select
        appendTo="body"
        [(ngModel)]="customerId"
        [clearable]="true"
        [items]="store.clients()"
        [style]="{ 'min-width': '150px' }"
        bindLabel="fullName"
        bindValue="id"
        inputId="dhClient"
      />


      <label for="dhStatut">Statut</label>
      <app-select
        [(ngModel)]="statut"
        [clearable]="false"
        [items]="typesDifferes"
        appendTo="body"
        bindLabel="label"
        bindValue="id"
        inputId="dhStatut"
      />


      <pharma-date-picker [(ngModel)]="modelStartDate" [maxDate]="modelEndDate" id="dhDu"
                          label="Du" />

      <pharma-date-picker [(ngModel)]="modelEndDate" [minDate]="modelStartDate" id="dhAu"
                          label="Au" />
    </ng-container>

    <ng-container ngProjectAs="[toolbarActions]">
      <div class="pharma-button-group">
        <app-button
          (clicked)="onSearch()"
          [loading]="store.loading()"
          [raised]="true"
          icon="pi pi-search"
          label="Rechercher"
          severity="info"
        />

        @if (canExport()) {
          <app-button
            (clicked)="exportPdf()"
            [loading]="loadingPdf"
            [raised]="true"
            icon="pi pi-file-pdf"
            label="PDF"
            severity="warn"
          />
        }
      </div>
    </ng-container>
  </app-toolbar>
  <!-- KPI Banner -->
  <app-differe-kpi-banner [summary]="store.summary()" />
  <!-- Hint premier usage -->
  @if (showHint() && !panelOpen()) {
    <div class="pharma-hint">
      <i class="pi pi-info-circle"></i>
      <span>Cliquez sur un client pour afficher le détail de ses ventes à crédit et procéder au règlement.</span>
      <button (click)="dismissHint()" aria-label="Fermer" class="pharma-hint-close" type="button">
        <i class="pi pi-times"></i>
      </button>
    </div>
  }

  <!-- Split container -->
  <div [class.panel-open]="panelOpen()" class="split-container">
    <div class="list-column">
      <app-differe-list [searchParams]="currentSearchParams()" />
    </div>

    @if (panelOpen()) {
      <div class="detail-column">
        <app-differe-detail-panel [canExecute]="canExecute()" [differe]="store.selectedDiffere()" />
      </div>
    }
  </div>

</div>
