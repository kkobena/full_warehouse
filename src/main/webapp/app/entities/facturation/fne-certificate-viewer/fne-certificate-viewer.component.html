@if (!isRunningInTauri) {
  <div class="modal-header">
    <h4 class="modal-title">
      <i class="pi pi-file-check"></i>
      Facture Certifiée FNE
    </h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="close()"></button>
  </div>

  <div class="modal-body fne-certificate-body">
    <iframe [src]="safeUrl" title="Facture certifiée FNE"></iframe>
  </div>

  <div class="modal-footer">

    <p-button (click)="close()" [text]="true" icon="pi pi-times" label="Fermer" severity="secondary" />
  </div>
} @else {
  <div class="modal-header">
    <h4 class="modal-title">
      <i class="pi pi-external-link"></i>
      Ouverture dans le navigateur...
    </h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="close()"></button>
  </div>

  <div class="modal-body">
    <div class="text-center p-4">
      <i class="pi pi-spin pi-spinner" style="font-size: 2rem; color: var(--p-primary-color);"></i>
      <p class="mt-3">Ouverture de la facture certifiée dans votre navigateur par défaut...</p>
      <small class="text-muted">Cette fenêtre se fermera automatiquement.</small>
    </div>
  </div>
}
