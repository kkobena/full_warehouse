<p-toast position="center"/>

<div class="modal-header">
  <h5 class="modal-title">Envoi commande PharmaML</h5>
  <button type="button" class="btn-close" (click)="dismiss()"></button>
</div>

<div class="modal-body">
  <div class="mb-3">
    <label class="form-label">Type de commande</label>
    <p-select
      [options]="typeCommandeOptions"
      [ngModel]="typeCommande()"
      (ngModelChange)="typeCommande.set($event)"
      optionLabel="label"
      optionValue="value"
      class="w-100"
    />
  </div>

  <div class="mb-3">
    <label class="form-label">Date de livraison souhaitée</label>
    <input
      type="date"
      class="form-control"
      [ngModel]="dateLivraison()"
      (ngModelChange)="dateLivraison.set($event)"
    />
  </div>

  <div class="mb-3">
    <label class="form-label">Commentaire</label>
    <textarea
      pTextarea
      rows="3"
      class="w-100"
      [ngModel]="commentaire()"
      (ngModelChange)="commentaire.set($event)"
    ></textarea>
  </div>
</div>

<div class="modal-footer">
  <p-button
    label="Annuler"
    severity="secondary"
    (onClick)="dismiss()"
  />
  <p-button
    label="Envoyer"
    icon="pi pi-send"
    [loading]="loading()"
    (onClick)="envoi()"
  />
</div>
