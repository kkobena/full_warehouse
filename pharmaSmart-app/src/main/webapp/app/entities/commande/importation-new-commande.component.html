<div class="modal-header">
  <h4 class="modal-title">{{ header }}</h4>
  <button (click)="cancel()" aria-label="Close" class="btn-close" type="button"></button>
</div>
<div class="modal-body">
  <app-card [variant]="'form'">
    <div class="form-grid-compact">
      <div class="form-field form-field-full">
        <label>Fournisseurs<span class="required">*</span></label>
        <app-fournisseur-select
          [grouped]="true"
          placeholder="Séléctionner un fournisseur"
          (selectionChange)="onFournisseurSelected($event)"
        />
      </div>
      <div class="form-field form-field-full">
        <label>Model de fichier<span class="required">*</span></label>
        <app-select
          [(ngModel)]="modelSelected"
          [searchable]="false"
          appendTo="body"
          [items]="models"
          bindLabel="label"
          bindValue="value"
          placeholder="Séléctionner un model de fichier "
        />
      </div>
      <div class="form-field form-field-full">
        <label>Charger un fichier<span class="required">*</span></label>
        <app-file-upload
          label="Importer un fichier"
          accept=".csv,.txt"
          (filesSelected)="onFilesSelected($event)"
        />
      </div>
    </div>
  </app-card>
</div>

<div class="modal-footer">
  <app-button
    (clicked)="cancel()"
    class="mr-2"
    data-dismiss="modal"
    icon="pi pi-times"
    label="Annuler"
    [raised]="true"
    severity="secondary"
    type="button"
  />

  <app-button
    (clicked)="save()"
    [disabled]="isSaving || !isValidForm()"
    icon="pi pi-check"
    id="save-entity"
    label="Enregister"
    [raised]="true"
    severity="primary"
  />
</div>
<jhi-spinner #spinner></jhi-spinner>
