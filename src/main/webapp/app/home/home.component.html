@if (account() !== null) {

  <!-- Dashboard Admin — sélecteur de période intégré dans HomeBaseComponent (P2) -->
  @if (isAdmin()) {
    <div class="container-fluid">
      <jhi-home-base></jhi-home-base>
    </div>
  }

  <!-- Dashboard Responsable Commande -->
  @if (isResponsableCommande() && !isAdmin()) {
    <app-commande-home></app-commande-home>
  }

  <!-- Dashboard Caissier -->
  @if (isCaissier() && !isAdmin() && !isResponsableCommande()) {
    <jhi-caissier-dashboard></jhi-caissier-dashboard>
  }

}
