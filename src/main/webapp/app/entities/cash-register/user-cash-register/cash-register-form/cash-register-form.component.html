<div class="modal-header">
  <h4 class="modal-title">Ouverture de caisse</h4>
  <button (click)="cancel()" class="btn-close" data-dismiss="modal" type="button"></button>
</div>

<form (ngSubmit)="openCashRegister()" [formGroup]="editForm" name="editForm" novalidate role="form">
  <div class="modal-body">

    <!-- Section 1: Champs Obligatoires -->
    <div class="pharma-card-modern">
      <div class="pharma-card-header">
        <div class="pharma-card-icon bg-success">
          <i class="pi pi-wallet"></i>
        </div>
        <div class="pharma-card-title-section">
          <h3 class="pharma-card-title">Ouverture de caisse</h3>
          <p class="pharma-card-subtitle">Saisissez le fonds de caisse pour démarrer</p>
        </div>
      </div>

      <div class="pharma-card-body">
        <div class="pharma-form-group">
          <label class="pharma-label" for="cashFundAmount">
            <i class="pi pi-money-bill"></i>
            Fonds de caisse (FCFA)
          </label>

          <p-inputNumber
            [allowEmpty]="false"
            [autofocus]="true"
            #cashFundAmountInput
            autocomplete="off"
            class="pharma-input-modern"
            formControlName="cashFundAmount"
            id="cashFundAmount"
            placeholder="Entrez le montant du fonds"
          />
          @if (editForm.get('cashFundAmount')?.invalid && editForm.get(
            'cashFundAmount')?.touched) {
            <small class="pharma-error-text">
              <i class="pi pi-exclamation-circle"></i>
              Veuillez saisir un montant valide
            </small>
          }
        </div>

      </div>
    </div>


  </div>

  <div class="form-actions-compact">
    <p-button
      (click)="cancel()"
      [raised]="true"
      class="mr-2"
      icon="pi pi-times"
      label="Annuler"
      severity="secondary"
      type="button"
    ></p-button>
    <p-button
      [loading]="isSaving"
      [disabled]="editForm.invalid || isSaving"
      [raised]="true"
      icon="pi pi-check"
      label="Enregistrer"
      severity="success"
      type="submit"
    ></p-button>
  </div>
</form>
<p-toast position="center"></p-toast>
