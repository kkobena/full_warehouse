<div class="modal-header">
  <h5 class="modal-title">{{ header }}</h5>
  <button (click)="cancel()" aria-label="Close" class="btn-close" type="button"></button>
</div>
<div class="modal-body">
  <app-card [variant]="'form'">
    <div class="form-group mb-1">
      <label class="form-label fw-semibold" for="model-select">Format du fichier grossiste</label>
      <app-select
        [(ngModel)]="selectedModel"
        [appendTo]="'body'"
        [items]="models"
        bindLabel="label"
        bindValue="value"
        class="w-100"
        inputId="model-select"
        placeholder="Sélectionner le format..."
      />
    </div>
    <div class="form-group">
      <app-file-upload
        (filesSelected)="onImporterReponseCommande($event)"
        [disabled]="!selectedModel"
        accept=".csv,.xls,.xlsx"
        label="Importer un fichier"
      />
    </div>
  </app-card>
</div>

<div class="modal-footer">
  <app-button (clicked)="cancel()" [raised]="true" icon="pi pi-times" label="Fermer"
              severity="secondary" type="button" />
</div>
<jhi-spinner #spinner></jhi-spinner>
