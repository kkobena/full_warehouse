<div class="modal-header">
  <h4 class="modal-title">{{ header }}</h4>
  <button (click)="cancel()" aria-label="Close" class="btn-close" type="button"></button>
</div>
<div class="modal-body">
  <app-card [variant]="'form'">
    <div class="p-fluid p-formgrid p-grid">
      <div class="p-field p-col">
        <label class="col-auto col-form-label">Quantité<span
          style="font-weight: 900; color: red">*</span></label>
        <input #startInput [(ngModel)]="startAt" [appKeyFilter]="'int'" autocomplete="off"
               class="form-control" type="text" />
        @if (startAt === 0 || startAt > 64) {
          <div>
            <small class="form-text text-danger" style="color: red"> Le nombre saisi doit être
              compris entre 0 et 64 </small>
          </div>
        }
      </div>
    </div>
  </app-card>
</div>

<div class="modal-footer">
  <app-button
    (clicked)="cancel()"
    [raised]="true"
    class="mr-1"
    icon="pi pi-times"
    label="Annuler"
    severity="secondary"
    type="button"
  ></app-button>
  <app-button
    (clicked)="save()"
    [disabled]="isSaving || startAt === 0 || startAt > 64"
    [raised]="true"
    icon="pi pi-check"
    label="Enregistrer"
    severity="success"
    type="submit"
  ></app-button>
</div>
