<div class="container">
  <div class="justify-content-center">
    <div class="pharma-smart-content p-2">
      <div class="pharma-toolbar">
        <div class="pharma-toolbar-header">
          <i class="pi pi-building"></i>
          <span class="pharma-toolbar-title">Liste des laboratoires de produit</span>
        </div>

        <div class="pharma-toolbar-content">
          <div class="pharma-toolbar-filters">
            <div class="pharma-search-input">
              <app-icon-field [overlay]="true" icon="pi pi-search">
                <input (keyup.enter)="search($event)" class="form-control"
                       placeholder="Taper pour rechercher" type="text" />
              </app-icon-field>
            </div>
          </div>

          <div class="pharma-toolbar-actions">
            <div class="pharma-button-group">
              <app-button (clicked)="showFileDialog()" [raised]="true" icon="pi pi-upload" label="Importer" severity="help" />
              <app-button (clicked)="addNewEntity()" [raised]="true" icon="pi pi-check" label="Nouveau" severity="success" />
            </div>
          </div>
        </div>
      </div>

      <div class="mt-2">
        <app-data-table
          (onLazyLoad)="lazyLoading($event)"
          [lazy]="true"
          [loading]="loading"
          [paginator]="true"
          [rows]="itemsPerPage"
          [selectionMode]="'single'"
          [size]="'small'"
          [stripedRows]="true"
          [totalRecords]="totalItems"
          [value]="entites"
          dataKey="id"
        >
          <ng-template #header>
            <tr class="pharma-table-head">
              <th scope="col"><span>Libellé</span></th>
              <th scope="col"></th>
            </tr>
          </ng-template>
          <ng-template #body let-elRow>
            <tr [appSelectableRow]="elRow">
              <td>
                <div class="pharma-entity-name">{{ elRow.libelle }}</div>
              </td>
              <td style="text-align: right">
                <app-button (clicked)="onEdit(elRow)" [iconOnly]="true" [rounded]="true" [text]="true"
                            ariaLabel="Editer" buttonClass="mr-2" icon="pi pi-pencil" ngbTooltip="Editer" severity="primary" />
                <app-button (clicked)="delete(elRow)" [iconOnly]="true" [rounded]="true" [text]="true"
                            ariaLabel="Supprimer" icon="pi pi-trash" ngbTooltip="Supprimer" severity="danger" />
              </td>
            </tr>
          </ng-template>
          <ng-template #emptymessage>
            <tr>
              <td [attr.colspan]="2">Aucune donnée trouvée</td>
            </tr>
          </ng-template>
        </app-data-table>
      </div>
    </div>
  </div>
</div>

<jhi-spinner #spinner></jhi-spinner>
