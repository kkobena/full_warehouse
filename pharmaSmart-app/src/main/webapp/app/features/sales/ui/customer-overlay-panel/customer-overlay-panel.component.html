<!-- Modern Customer Overlay Panel -->
<div class="customer-panel-wrapper">
  <!-- Customer Search Popover -->
  <p-popover #op [style]="{ width: '650px' }">
    <ng-template #content>
      <app-customer-search-table (customerSelected)="onCustomerSelected($event)" />
    </ng-template>
  </p-popover>

  <!-- Customer Display Card -->
  <div class="customer-display-card">
    <!-- Action Buttons -->
    <div class="customer-action-btn">
      @if (customer()) {
        <!-- Edit button - opens popover to replace customer -->
        <p-button
          (click)="togglePopover($event)"
          pTooltip="Changer le client"
          tooltipPosition="top"
          icon="pi pi-pencil"
          severity="info"
          size="small"
          [rounded]="true"
          [text]="true"
          class="edit-customer-btn"
        >
        </p-button>
        <!-- Remove button -->
        <p-button
          (click)="remove()"
          pTooltip="Supprimer le client"
          tooltipPosition="top"
          icon="pi pi-times"
          severity="danger"
          size="small"
          [rounded]="true"
          [text]="true"
          class="remove-customer-btn"
        >
        </p-button>
      } @else {
        <p-button
          (click)="togglePopover($event)"
          [pTooltip]="getLabel()"
          tooltipPosition="top"
          icon="pi pi-user-plus"
          severity="success"
          size="small"
          [rounded]="true"
          class="add-customer-btn"
        >
        </p-button>
      }
    </div>

    <!-- Customer Information Display -->
    @if (customer()) {
      <div class="customer-info-display">
        <div class="customer-info-row">
          <div class="info-item name-info">
            <i class="pi pi-user"></i>
            <div class="info-content">
              <span class="info-label">Client</span>
              <span class="info-value">{{ customer()?.fullName }}</span>
            </div>
          </div>

          <div class="info-item phone-info">
            <i class="pi pi-phone"></i>
            <div class="info-content">
              <span class="info-label">Mobile</span>
              <span class="info-value">{{ customer()?.phone }}</span>
            </div>
          </div>
        </div>
      </div>
    } @else {
      <div class="customer-placeholder">
        <i class="pi pi-user-plus"></i>
        <span>Sélectionner un client</span>
      </div>
    }
  </div>
</div>
