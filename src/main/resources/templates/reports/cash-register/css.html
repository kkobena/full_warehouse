<th:block th:fragment="css">
  <div th:replace="~{common/css :: css}"></div>
  <style th:inline="css">
    .date-info {
      margin-bottom: 10px;
      padding: 8px;
      background-color: #f8f9fa;
      border-left: 4px solid #3989c6;
      font-size: 10px;
    }

    .summary-section {
      margin-bottom: 15px;
      padding: 10px;
      background-color: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 4px;
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
    }

    .summary-item {
      padding: 10px;
      text-align: center;
    }

    .summary-label {
      font-size: 9px;
      color: #6c757d;
      margin-bottom: 5px;
    }

    .summary-value {
      font-size: 12px;
      font-weight: bold;
      color: #212529;
    }

    .breakdown-row {
      background-color: #f8f9fa;
    }

    .payment-breakdown {
      padding: 10px !important;
      font-size: 9px;
    }

    .breakdown-table {
      width: 100%;
      margin-top: 5px;
      border-collapse: collapse;
    }

    .breakdown-table td {
      padding: 3px 8px;
      font-size: 8px;
    }

    .text-red {
      color: #dc3545;
      font-weight: bold;
    }

    .text-green {
      color: #28a745;
      font-weight: bold;
    }
  </style>
</th:block>
