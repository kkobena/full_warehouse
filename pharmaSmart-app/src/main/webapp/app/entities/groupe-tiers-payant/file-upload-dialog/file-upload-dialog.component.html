<div class="modal-header">
  <h4 class="modal-title">Importer un fichier</h4>
  <button (click)="cancel()" aria-label="Close" class="btn-close" type="button"></button>
</div>
<div class="modal-body">
  <app-card [variant]="'form'">
    <app-file-upload
      (filesSelected)="onFilesSelected($event)"
      (rejected)="onRejected($event)"
      [accept]="accept"
      label="Importer un fichier"
    />

    @if (error()) {
      <div class="text-danger small mt-2">{{ error() }}</div>
    }
  </app-card>
</div>
<div class="modal-footer">
  <app-button (clicked)="cancel()" icon="pi pi-times" label="Annuler" severity="secondary" />

  <app-button (clicked)="upload()" [disabled]="!selectedFile()" icon="pi pi-check"
              label="Enrégistrer" severity="info" />
</div>
