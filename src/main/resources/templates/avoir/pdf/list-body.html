<table class="main-table" xmlns:th="http://www.thymeleaf.org">
  <thead>
    <tr>
      <th>N° Avoir</th>
      <th>Facture origine</th>
      <th>Tiers-payant</th>
      <th>Date avoir</th>
      <th class="text-right">Montant TTC</th>
      <th class="text-right">TVA</th>
      <th class="text-right">HT</th>
      <th>Statut</th>
      <th>Motif</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="avoir : ${avoirs}">
      <td th:text="${avoir.numAvoir}"></td>
      <td th:text="${avoir.factureTiersPayant.numFacture}"></td>
      <td th:text="${avoir.tiersPayantName}"></td>
      <td th:text="${avoir.avoirDate != null ? #temporals.format(avoir.avoirDate, 'dd/MM/yyyy') : '—'}"></td>
      <td class="unit" th:text="${#numbers.formatDecimal(avoir.montantAvoir, 1, 'COMMA', 0, 'POINT')}"></td>
      <td class="unit" th:text="${#numbers.formatDecimal(avoir.montantTva, 1, 'COMMA', 0, 'POINT')}"></td>
      <td class="unit" th:text="${#numbers.formatDecimal(avoir.montantHt, 1, 'COMMA', 0, 'POINT')}"></td>
      <td th:text="${avoir.statut != null ? avoir.statut.name() : '—'}"></td>
      <td th:text="${avoir.motif}"></td>
    </tr>
  </tbody>
  <tfoot class="datatable-footer">
    <tr class="tr-footer">
      <td class="datatable-footer-total-label" colspan="4">TOTAL</td>
      <td class="unit" th:text="${#numbers.formatDecimal(totalMontant, 1, 'COMMA', 0, 'POINT')}"></td>
      <td class="unit" th:text="${#numbers.formatDecimal(totalTva, 1, 'COMMA', 0, 'POINT')}"></td>
      <td class="unit" th:text="${#numbers.formatDecimal(totalHt, 1, 'COMMA', 0, 'POINT')}"></td>
      <td colspan="2"></td>
    </tr>
  </tfoot>
</table>
