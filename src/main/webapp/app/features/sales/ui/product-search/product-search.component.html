<p-floatlabel variant="on">
  <p-autoComplete
    #produitbox
    [(ngModel)]="produitSelected"
    (ngModelChange)="onNgModelChange($event)"
    [suggestions]="produits()"
    (completeMethod)="searchFn($event)"
    (onSelect)="onSelect()"
    (keydown)="onKeyDown($event)"
    [minQueryLength]="PRODUIT_COMBO_MIN_LENGTH"
    optionLabel="libelle"
    [appendTo]="APPEND_TO"
    [autofocus]="autofocus()"
    [showClear]="showClear()"
    [style]="style()"
    [inputStyle]="inputStyle()"
    [disabled]="disabled()"
    dataKey="id"
    placeholder=" ">
    <ng-template #item let-item>
      <div [style]="{ width: '100%' }">
        <span [class.stockless]="item.totalQuantity <= 0" style="width: 20%; display: inline-block">
          {{ item.fournisseurProduit?.codeCip }}
        </span>
        <span [class.stockless]="item.totalQuantity <= 0">
          {{ item.libelle }}
        </span>
        <span [class.stockless]="item.totalQuantity <= 0" class="float-right">
          {{ item.fournisseurProduit?.prixUni | number }}
        </span>

      <!--  <span class="float-right" style="display: inline-flex; align-items: center; gap: 6px;">
          <span [class.stockless]="item.totalQuantity <= 0" title="Stock rayon">
            <i class="pi pi-database" style="font-size: 0.75rem"></i> {{ item.totalQuantity | number }}
          </span>
          @if ((item.reserveQuantity || 0) > 0) {
            <span class="reserve-badge" title="Stock réserve">
              <i class="pi pi-box" style="font-size: 0.75rem"></i> {{ item.reserveQuantity | number }}
            </span>
          }
          <span [class.stockless]="item.totalQuantity <= 0">
            {{ item.fournisseurProduit?.prixUni | number }}
          </span>
        </span>-->

      </div>
    </ng-template>
  </p-autoComplete>
  <label>{{ 'warehouseApp.labels.produits' | translate }}</label>
</p-floatlabel>
